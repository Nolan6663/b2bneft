<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Платформа - Кабинет Производителя</title>
    <style>
/* ПРЕМИАЛЬНАЯ МИНИМАЛИСТИЧНАЯ ДИЗАЙН-СИСТЕМА */
        :root {
            --bg-main: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-sidebar: #090d16;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-green: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --border-color: rgba(15, 23, 42, 0.06);
            --modal-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #f1f5f9;
            --input-text: #0f172a;
            --sidebar-text: #f1f5f9;
            --blur-effect: blur(12px);
        }

        body.dark-mode {
            --bg-main: #030712;
            --bg-card: rgba(17, 24, 39, 0.6);
            --bg-sidebar: #0b0f19;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.25);
            --border-color: rgba(255, 255, 255, 0.05);
            --modal-bg: rgba(15, 23, 42, 0.95);
            --input-bg: #0f172a;
            --input-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.3s ease, 
                        transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.3s ease;
        }

        body {
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ПОЛНОЕ ИСПРАВЛЕНИЕ СAЙДБАРА */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Плотный аккуратный шаг между пунктами */
        }

        .sidebar h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Полный сброс фиолетового цвета для ВСЕХ ссылок меню */
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 10px;
            color: rgba(241, 245, 249, 0.6) !important; /* Матовый светлый текст по умолчанию */
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 500;
        }

        /* Эффект при наведении */
        .sidebar a:hover {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.04);
        }

        /* Активный пункт меню */
        .sidebar a.active {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }

        /* Контейнер переключателя темы (всегда прижат вниз) */
        .theme-container {
            margin-top: auto; /* Выталкивает весь блок в самый низ */
            padding-top: 20px;
            margin-bottom: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .theme-text {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
        }

        /* Нижняя кнопка смены кабинета */
        .sidebar .switch-link {
            margin-top: 0;
            padding: 14px;
            text-align: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03) !important;
            color: #ffffff !important;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .sidebar .switch-link:hover {
            background: #ffffff !important;
            color: #090d16 !important;
            border-color: transparent !important;
            transform: translateY(-1px);
        }

        /* КОНТЕНТ */
        .main-content {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
        }

        /* ФИЛЬТРЫ */
        .filter-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--blur-effect);
            padding: 20px 32px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
        }

        .filter-section label { font-size: 14px; font-weight: 500; color: var(--text-muted); }
        
        .filter-section select {
            background: var(--input-bg);
            border: 1px solid transparent;
            padding: 10px 16px;
            border-radius: 8px;
            color: var(--input-text);
            outline: none;
            font-size: 14px;
        }

        /* КАРТОЧКИ ТЕНДЕРОВ — ЭФФЕКТ СТЭКЛА */
        .order-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--blur-effect);
            border-radius: 16px;
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.01);
            margin-bottom: 16px;
        }

        .order-item:hover {
            transform: translateY(-3px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.03);
        }

        .order-info h4 { font-size: 19px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
        .order-info .meta { font-size: 13px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 15px; }

        .btn-respond {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-respond:hover {
            background: #059669;
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; display: inline-block; }
        .tag.rti { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag.metal { background: rgba(99, 102, 241, 0.1); color: #6366f1; }

        /* ТАБЛИЦА МОИХ ОТКЛИКОВ */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            margin-top: 20px;
        }
        .section h3 { margin-bottom: 24px; font-size: 18px; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 16px; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
        td { padding: 18px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }

        .badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
        .badge.waiting { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge.win { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge.loose { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        /* МОДАЛКИ */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.4); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg); border: 1px solid var(--border-color);
            backdrop-filter: var(--blur-effect); padding: 40px; border-radius: 24px; width: 480px;
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
        .form-group label { font-size: 13px; color: var(--text-muted); }
        .form-group input, .form-group select {
            background: var(--input-bg); border: 1px solid transparent; padding: 14px; border-radius: 10px; color: var(--input-text); outline: none;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-cancel { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 24px; border-radius: 10px; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 24px; }
            .main-content { padding: 24px; }
            .order-item { flex-direction: column; align-items: stretch; gap: 16px; }
            .btn-respond { width: 100%; text-align: center; }
        }
        /* СТИЛИ ИСПРАВЛЕНИЯ ПОЛЗУНКА ТЕМЫ */
        .theme-container {
            margin-top: auto; /* Прижимает блок к самому низу */
            padding-top: 15px;
            margin-bottom: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .theme-text {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .theme-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            border-radius: 20px;
            transition: 0.3s;
        }

        .theme-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        /* Зеленая подсветка для производителя */
        .theme-switch input:checked + .theme-slider {
            background-color: var(--accent-green);
        }

        .theme-switch input:checked + .theme-slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>

<div class="sidebar">
        <h1>B2B Платформа</h1>
        
        <a href="#" class="active">Актуальные тендеры</a>
        <a href="#">Мои отклики</a>
        
        <div class="theme-container">
            <span id="themeLabel" class="theme-text">☀️ Светлая тема</span>
            <label class="theme-switch">
                <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
                <span class="theme-slider"></span>
            </label>
        </div>

        <a href="index.html" class="switch-link">Войти как Заказчик</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Кабинет Производителя</h2>
        </div>
              <div class="filter-section" style="background: #eef2f7; border-left: 5px solid #2ecc71;">
                <label for="companySelect"><strong>Вы вошли как организация:</strong></label>
                <select id="companySelect">
                    <option value="Завод РТИ-Профи">ООО «Завод РТИ-Профи»</option>
                    <option value="Металл-Сервис">АО «Металл-Сервис»</option>
                    <option value="УралПолимер">ПК «УралПолимер»</option>
                </select>
            </div>
        <div class="filter-section">
            <label for="categoryFilter">Фильтр по категориям:</label>
            <select id="categoryFilter" onchange="filterOrders()">
                <option value="all">Все категории</option>
                <option value="РТИ">РТИ</option>
                <option value="Металл">Металл</option>
            </select>
        </div>

        <div class="section">
            <h3>Доступные тендеры (Заявки заказчиков)</h3>
            <div id="ordersList" class="orders-list">
                </div>
        </div>

        <div class="section">
            <h3>Направленные нами предложения (КП)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Изделие</th>
                        <th>Предложенная цена</th>
                        <th>Срок поставки</th>
                        <th>Статус отклика</th>
                    </tr>
                </thead>
                <tbody id="myResponsesTable">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="respondModal">
        <div class="modal-content">
            <h3 id="modalTargetTitle">Отклик на тендер</h3>
            <input type="number" id="offerPrice" placeholder="Цена, ₽/шт">
            <input type="number" id="offerDays" placeholder="Срок поставки (дней)">
            <div class="modal-buttons">
                <button class="btn-close" onclick="closeRespondModal()">Отмена</button>
                <button class="btn-submit" onclick="sendProposal()">Отправить КП</button>
            </div>
        </div>
    </div>

<script>
        const SERVER_URL = 'https://b2b-neft-backend.onrender.com/api';
        let currentOrderId = null;
        let currentOrderTitle = "";

        window.addEventListener('DOMContentLoaded', () => {
            loadOrdersForProducers();
            loadMyProposals();
        });

async function loadOrdersForProducers() {
    try {
        const response = await fetch(`${SERVER_URL}/orders`);
        const orders = await response.json();
        
        const ordersList = document.getElementById('ordersList');
        if (!ordersList) return;
        ordersList.innerHTML = ''; 

        orders.forEach(order => {
            const orderItem = document.createElement('div');
            orderItem.className = 'order-item';
            orderItem.setAttribute('data-category', order.category);
            
            const tagClass = order.category === 'РТИ' ? 'rti' : 'metal';

            // Логика для кнопки: если тендер закрыт, блокируем отклик
            let actionButton = '';
            let statusText = order.status;

            if (order.status === 'Закрыта') {
                statusText = '<span style="color: #e74c3c; font-weight: bold;">Закрыт (Победитель выбран)</span>';
                actionButton = `<button class="btn-respond" style="background-color: #95a5a6; cursor: not-allowed;" disabled>Тендер завершён</button>`;
            } else {
                statusText = `<span style="color: #2ecc71; font-weight: bold;">${order.status}</span>`;
                actionButton = `<button class="btn-respond" onclick="openRespondModal(${order.id}, '${order.title.replace(/'/g, "\\'")}')">Откликнуться</button>`;
            }

            orderItem.innerHTML = `
                <div class="order-info">
                    <h4>${order.title}</h4>
                    <span class="tag ${tagClass}">${order.category}</span>
                    <span class="meta">Статус: ${statusText} | Уже откликов: ${order.responses}</span>
                    <div class="meta" style="margin-top: 5px; font-weight: bold;">Дедлайн: ${order.deadline}</div>
                </div>
                ${actionButton}
            `;
            ordersList.appendChild(orderItem);
        });
    } catch (error) {
        console.error('Ошибка при загрузке заявок для производителей:', error);
    }
}

        async function loadMyProposals() {
            try {
                const response = await fetch(`${SERVER_URL}/proposals`);
                const proposals = await response.json();
                
                const tableBody = document.getElementById('myResponsesTable');
                if (!tableBody) return;
                tableBody.innerHTML = ''; 

                proposals.forEach(prop => {
                    const row = document.createElement('tr');
    
                    let badgeClass = 'badge waiting';
                    if (prop.status === 'Выигран') badgeClass = 'badge win';
                    if (prop.status === 'Отклонен') badgeClass = 'badge loose';

                    row.innerHTML = `
                        <td><strong>${prop.orderTitle || 'Заявка #' + prop.orderId}</strong></td>
                        <td>${prop.price} ₽/шт</td>
                        <td>${prop.days} дней</td>
                        <td><span class="${badgeClass}">${prop.status}</span></td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Ошибка при загрузке предложений:', error);
            }
        }

        function openRespondModal(id, title) {
            currentOrderId = Number(id);
            currentOrderTitle = title;
            const modalTitle = document.getElementById('modalTargetTitle');
            if (modalTitle) modalTitle.innerText = `Отклик на: ${title}`;
            
            const modal = document.getElementById('respondModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeRespondModal() {
            document.getElementById('respondModal').style.display = 'none';
        }

        async function sendProposal() {
            const priceInput = document.getElementById('offerPrice');
            const daysInput = document.getElementById('offerDays');
            const companySelect = document.getElementById('companySelect');

            if (!priceInput || !daysInput || !companySelect) return;

            const price = parseFloat(priceInput.value);
            const days = parseInt(daysInput.value, 10);
            const companyName = companySelect.value;

            // Сбрасываем стили ошибок
            priceInput.style.borderColor = '#ccc';
            daysInput.style.borderColor = '#ccc';

            // Проверка 1: Заполнено ли вообще
            if (isNaN(price) || isNaN(days)) {
                alert('Укажите цену и сроки поставки!');
                if (isNaN(price)) priceInput.style.borderColor = '#e74c3c';
                if (isNaN(days)) daysInput.style.borderColor = '#e74c3c';
                return;
            }

            // Проверка 2: Логика чисел (цена и срок должны быть больше нуля)
            if (price <= 0 || days <= 0) {
                alert('Цена и срок поставки должны быть больше нуля!');
                if (price <= 0) priceInput.style.borderColor = '#e74c3c';
                if (days <= 0) daysInput.style.borderColor = '#e74c3c';
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/proposals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        orderId: currentOrderId, 
                        orderTitle: currentOrderTitle, 
                        price: price, 
                        days: days,
                        company: companyName
                    })
                });

                if (response.ok) {
                    closeRespondModal();
                    priceInput.value = '';
                    daysInput.value = '';
                    await loadOrdersForProducers(); 
                    await loadMyProposals();        
                    if (typeof filterOrders === 'function') filterOrders();
                } else {
                    alert('Сервер отклонил сохранение КП');
                }
            } catch (error) {
                console.error('Ошибка при отправке предложения:', error);
            }
        }

function filterOrders() {
    const selectedCategory = document.getElementById('categoryFilter').value;
    const orderItems = document.querySelectorAll('.order-item');
    
    orderItems.forEach(item => {
        const itemCategory = item.getAttribute('data-category');
        
        if (selectedCategory === 'all' || itemCategory === selectedCategory) {
            item.style.display = 'flex'; // Показываем карточку
        } else {
            item.style.display = 'none'; // Скрываем карточку
        }
    });
}
// ДИНАМИЧЕСКАЯ СМЕНА ТЕМЫ ДЛЯ КАБИНЕТА ПРОИЗВОДИТЕЛЯ
function toggleTheme() {
    const body = document.body;
    const checkbox = document.getElementById('themeCheckbox');
    const label = document.getElementById('themeLabel');
    if (!checkbox || !label) return;

    if (checkbox.checked) {
        body.classList.add('dark-mode');
        label.innerText = '🌙 Тёмная тема';
        localStorage.setItem('theme', 'dark');
    } else {
        body.classList.remove('dark-mode');
        label.innerText = '☀️ Светлая тема';
        localStorage.setItem('theme', 'light');
    }
}

// Автоматическая проверка темы при загрузке страницы
document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme');
    const body = document.body;
    const checkbox = document.getElementById('themeCheckbox');
    const label = document.getElementById('themeLabel');
    
    if (savedTheme === 'dark') {
        body.classList.add('dark-mode');
        if (checkbox) checkbox.checked = true;
        if (label) label.innerText = '🌙 Тёмная тема';
    } else {
        if (checkbox) checkbox.checked = false;
        if (label) label.innerText = '☀️ Светлая тема';
    }
});
    </script>
</body>
</html>
