<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Аналитический дашборд</title>
    <script>if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <style>html{background:#070d12}html.light-mode{background:#f3f6f8}</style>
    <link rel="stylesheet" href="assets/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .date-range { display: flex; align-items: center; gap: 8px; }
        .date-range input[type="date"] { height: 38px; width: auto; transition: border-color 0.15s ease; }
        .date-range input[type="date"]:focus { border-color: var(--accent-bright); }
        .company-badge { font-size: 12.5px; color: var(--text-secondary); }
        .company-badge strong { color: var(--text-primary); }

        @media (max-width: 480px) {
            .date-range { flex-wrap: wrap; gap: 6px; }
            .date-range input[type="date"] { font-size: 12px; padding: 0 8px; height: 34px; }
        }
    </style>
</head>
<body>

        <a href="#" id="mainCabinetLink"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Актуальные закупки</a>
        <a href="proposals.html" id="navProposals"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Мои отклики<span class="nav-badge" id="navBadgeProposals"></span></a>

        <a href="partners.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Контрагенты</a>
        <a href="analytics.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Аналитика</a>
        <a href="messages.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Сообщения<span class="nav-badge" id="navBadgeMessages"></span></a>
        <a href="favorites.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Избранное</a>
        <a href="#" id="sidebarProfileLink" style="display:none;">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 21v-1a7 7 0 0 1 16 0v1"></path></svg>
            Мой профиль
        </a>
        <a href="settings.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>Настройки</a>
        <a href="tariff.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Тариф и оплата</a>

        <div class="sidebar-bottom">
            <div class="theme-toggle-row">
                <span id="themeLabel" class="theme-label">🌙 Тёмная тема</span>
                <label class="theme-switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
            </div>
            <a href="#" class="switch-link" onclick="logout(); return false;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Выйти из аккаунта
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Аналитический дашборд</h2>
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="date-range">
                    <input type="date" id="dateFrom" class="date-input">
                    <span style="color: var(--text-secondary);">–</span>
                    <input type="date" id="dateTo" class="date-input">
                </div>
                <button class="bell-btn" onclick="openNotificationsModal()">
                    <img src="assets/icons_svg/bell.svg" alt="" style="width:18px;height:18px;">
                    <span class="bell-badge" id="bellBadge">0</span>
                </button>
            </div>
        </div>
        <div id="companyMeta" class="company-badge"></div>

        <div class="kpi-grid" id="metricsGrid"></div>

        <div class="charts-grid">
            <div class="chart-card">
                <h4 id="mainChartTitle">Динамика и объёмы данных</h4>
                <div style="position: relative; height: 280px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h4 id="secondaryChartTitle">Структура долей</h4>
                <div style="position: relative; height: 280px;">
                    <canvas id="secondaryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="notificationModal">
        <div class="modal-content" style="width: 440px;">
            <h3>Уведомления платформы</h3>
            <div id="notificationsList" style="max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; background: var(--inner-bg); border-radius: 12px; border: 1px solid var(--inner-border);"></div>
            <div class="modal-actions" style="justify-content: space-between;">
                <button onclick="clearNotifications()" style="color: var(--error); border:none; background:transparent; cursor:pointer; font-size: 13px; padding: 8px 14px;">Очистить историю</button>
                <button class="btn-modal-cancel" onclick="closeNotificationsModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="assets/app.js"></script>
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = 'login.html';

        const role = localStorage.getItem('userRole');
        const companyName = localStorage.getItem('userCompany') || 'Организация';

        let chartInstanceMain = null;
        let chartInstanceSecondary = null;

        window.addEventListener('DOMContentLoaded', () => {
            const mainLink = document.getElementById('mainCabinetLink');
            if (mainLink) mainLink.href = role === 'customer' ? 'index.html' : 'producer.html';

            if (role === 'producer') {
                const myId = localStorage.getItem('myCompanyId');
                const sidebarLink = document.getElementById('sidebarProfileLink');
                if (myId && sidebarLink) { sidebarLink.href = `company-profile.html?id=${myId}`; sidebarLink.style.display = ''; }
            }

            const today = new Date();
            const from = new Date(today); from.setDate(from.getDate() - 90);
            document.getElementById('dateTo').value = today.toISOString().slice(0, 10);
            document.getElementById('dateFrom').value = from.toISOString().slice(0, 10);
            document.getElementById('dateFrom').addEventListener('change', loadDashboard);
            document.getElementById('dateTo').addEventListener('change', loadDashboard);

            setupInterface();
            loadDashboard();
            initNotifications();
            initSidebarBadges();

            const themeCb = document.getElementById('themeCheckbox');
            if (themeCb) themeCb.addEventListener('change', loadDashboard);
        });

        function setupInterface() {
            const metaEl = document.getElementById('companyMeta');
            if (metaEl) {
                metaEl.innerHTML = `Контрагент: <strong>${companyName}</strong> &nbsp;|&nbsp; Доступ: <span style="color: var(--accent-bright); font-weight: 600;">${role === 'customer' ? 'Заказчик' : 'Производитель'}</span>`;
            }
        }

        function cssVar(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function getChartThemeOptions() {
            const textColor = cssVar('--text-secondary');
            const gridColor = cssVar('--border-subtle');
            return {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: textColor, font: { family: 'Manrope', size: 11.5 }, usePointStyle: true, pointStyle: 'circle', padding: 14 } },
                    tooltip: {
                        backgroundColor: cssVar('--card-bg'), titleColor: cssVar('--text-primary-alt'), bodyColor: cssVar('--text-tertiary'),
                        borderColor: cssVar('--card-border'), borderWidth: 1, padding: 10, cornerRadius: 8, displayColors: false,
                        titleFont: { family: 'Manrope', weight: '700', size: 12 }, bodyFont: { family: 'Manrope', size: 12 }
                    }
                },
                scales: {
                    x: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Manrope', size: 11 } } },
                    y: { grid: { color: gridColor }, ticks: { color: textColor, font: { family: 'Manrope', size: 11 } } }
                }
            };
        }

        /* Мини-спарклайн (кумулятивный тренд по бакетам периода) — декоративный, но честный: даже при малом числе записей рисует реальный паттерн активности, а не пустую заглушку. */
        function bucketedCumulative(items, dateField, from, to, valueFn, bucketCount = 10) {
            const span = Math.max(1, to.getTime() - from.getTime());
            const bucketMs = span / bucketCount;
            const buckets = new Array(bucketCount).fill(0);
            items.forEach(item => {
                const t = new Date(item[dateField]).getTime();
                if (t < from.getTime() || t > to.getTime()) return;
                let idx = Math.floor((t - from.getTime()) / bucketMs);
                if (idx >= bucketCount) idx = bucketCount - 1;
                if (idx < 0) idx = 0;
                buckets[idx] += valueFn ? valueFn(item) : 1;
            });
            let cum = 0;
            return buckets.map(v => (cum += v));
        }

        function sparklineSVG(values, isUp) {
            if (!values || values.length < 2) values = [0, 0];
            const w = 64, h = 28, pad = 3;
            const max = Math.max(...values, 1);
            const min = Math.min(...values, 0);
            const range = (max - min) || 1;
            const stepX = (w - pad * 2) / (values.length - 1);
            const points = values.map((v, i) => {
                const x = pad + i * stepX;
                const y = h - pad - ((v - min) / range) * (h - pad * 2);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
            const color = isUp ? 'var(--accent-bright)' : 'var(--error)';
            const last = points.split(' ').pop();
            return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="${last.split(',')[0]}" cy="${last.split(',')[1]}" r="2.2" fill="${color}"/>
            </svg>`;
        }

        function kpiIcon(type) {
            const icons = {
                check: '<path d="M20 6L9 17l-5-5"></path>',
                money: '<line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>',
                percent: '<line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle>',
                x: '<circle cx="12" cy="12" r="9"></circle><path d="M15 9l-6 6M9 9l6 6"></path>',
                box: '<path d="M21 8l-9-5-9 5 9 5 9-5z"></path><path d="M3 8v8l9 5 9-5V8"></path><path d="M12 13v8"></path>',
                inbox: '<path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>'
            };
            return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[type] || icons.check}</svg>`;
        }

        function getRange() {
            const from = new Date(document.getElementById('dateFrom').value);
            const to = new Date(document.getElementById('dateTo').value);
            to.setHours(23, 59, 59, 999);
            const spanMs = to - from;
            const prevTo = new Date(from.getTime() - 1);
            const prevFrom = new Date(from.getTime() - spanMs);
            return { from, to, prevFrom, prevTo };
        }

        function inRange(dateStr, from, to) {
            const d = new Date(dateStr);
            return d >= from && d <= to;
        }

        function pctChange(curr, prev) {
            if (prev === 0) return curr === 0 ? 0 : 100;
            return ((curr - prev) / prev) * 100;
        }

        function kpiCard(label, value, changePct, iconType, sparkValues) {
            const isUp = changePct >= 0;
            const cls = isUp ? 'up' : 'down';
            const sign = isUp ? '+' : '';
            return `<div class="kpi-card">
                <div class="kpi-top">
                    <div class="kpi-icon">${kpiIcon(iconType)}</div>
                    <div class="kpi-sparkline">${sparklineSVG(sparkValues, isUp)}</div>
                </div>
                <div class="kpi-label">${label}</div>
                <div class="kpi-value">${value}</div>
                <div class="kpi-change ${cls}">${sign}${changePct.toFixed(1)}% <span class="kpi-change-note">к прошлому периоду</span></div>
            </div>`;
        }

        async function loadDashboard() {
            const grid = document.getElementById('metricsGrid');
            if (!grid) return;
            const { from, to, prevFrom, prevTo } = getRange();

            try {
                const headers = { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') };

                if (role === 'customer') {
                    document.getElementById('mainChartTitle').innerText = 'Количество предложений по тендерам';
                    document.getElementById('secondaryChartTitle').innerText = 'Доли товарных категорий в закупках';

                    const response = await fetch(`${SERVER_URL}/orders`, { headers });
                    const allOrders = await response.json();
                    const orders = allOrders.filter(o => o.company === companyName && inRange(o.createdAt, from, to));
                    const prevOrders = allOrders.filter(o => o.company === companyName && inRange(o.createdAt, prevFrom, prevTo));

                    const closed = orders.filter(o => o.status === 'Закрыта').length;
                    const prevClosed = prevOrders.filter(o => o.status === 'Закрыта').length;
                    const responses = orders.reduce((s, o) => s + (o.responses || 0), 0);
                    const prevResponses = prevOrders.reduce((s, o) => s + (o.responses || 0), 0);
                    const conversion = orders.length ? (closed / orders.length) * 100 : 0;
                    const prevConversion = prevOrders.length ? (prevClosed / prevOrders.length) * 100 : 0;

                    grid.innerHTML =
                        kpiCard('Размещено закупок', orders.length, pctChange(orders.length, prevOrders.length), 'box', bucketedCumulative(orders, 'createdAt', from, to)) +
                        kpiCard('Получено предложений', responses, pctChange(responses, prevResponses), 'inbox', bucketedCumulative(orders, 'createdAt', from, to, o => o.responses || 0)) +
                        kpiCard('Завершено закупок', closed, pctChange(closed, prevClosed), 'check', bucketedCumulative(orders.filter(o => o.status === 'Закрыта'), 'createdAt', from, to)) +
                        kpiCard('Конверсия по тендерам', conversion.toFixed(1) + '%', pctChange(conversion, prevConversion), 'percent', bucketedCumulative(orders, 'createdAt', from, to));

                    renderCharts(
                        'bar',
                        { labels: orders.map(o => o.title), datasets: [{ label: 'Подано КП', data: orders.map(o => o.responses || 0), backgroundColor: '#41bd97', borderRadius: 6, maxBarThickness: 46 }] },
                        'doughnut',
                        { labels: ['РТИ', 'Металл'], datasets: [{ data: [orders.filter(o => o.category === 'РТИ').length, orders.filter(o => o.category === 'Металл').length], backgroundColor: ['#41bd97', '#3a4a55'], borderColor: cssVar('--card-bg'), borderWidth: 3, hoverOffset: 6 }] }
                    );
                } else {
                    document.getElementById('mainChartTitle').innerText = 'Ценовой мониторинг выигранных контрактов';
                    document.getElementById('secondaryChartTitle').innerText = 'Конверсия предложений';

                    const response = await fetch(`${SERVER_URL}/proposals`, { headers });
                    const allProposals = await response.json();
                    const myAll = allProposals.filter(p => p.company === companyName);
                    const myProps = myAll.filter(p => inRange(p.createdAt, from, to));
                    const prevProps = myAll.filter(p => inRange(p.createdAt, prevFrom, prevTo));

                    const won = myProps.filter(p => p.status === 'Выигран');
                    const prevWon = prevProps.filter(p => p.status === 'Выигран');
                    const rejected = myProps.filter(p => p.status === 'Отклонен');
                    const prevRejected = prevProps.filter(p => p.status === 'Отклонен');
                    const totalSum = won.reduce((s, p) => s + p.price, 0);
                    const prevSum = prevWon.reduce((s, p) => s + p.price, 0);
                    const conversion = myProps.length ? (won.length / myProps.length) * 100 : 0;
                    const prevConversion = prevProps.length ? (prevWon.length / prevProps.length) * 100 : 0;

                    grid.innerHTML =
                        kpiCard('Выиграно контрактов', won.length, pctChange(won.length, prevWon.length), 'check', bucketedCumulative(won, 'createdAt', from, to)) +
                        kpiCard('Общая сумма выигранных', '₽ ' + totalSum.toLocaleString(), pctChange(totalSum, prevSum), 'money', bucketedCumulative(won, 'createdAt', from, to, p => p.price)) +
                        kpiCard('Конверсия предложений', conversion.toFixed(1) + '%', pctChange(conversion, prevConversion), 'percent', bucketedCumulative(myProps, 'createdAt', from, to)) +
                        kpiCard('Отклонено предложений', rejected.length, pctChange(rejected.length, prevRejected.length), 'x', bucketedCumulative(rejected, 'createdAt', from, to));

                    renderCharts(
                        'line',
                        { labels: won.map(p => p.orderTitle || 'Лот'), datasets: [{ label: 'Цена контракта', data: won.map(p => p.price), borderColor: '#54c79f', backgroundColor: 'rgba(70,200,160,0.2)', fill: true, tension: 0.3, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: cssVar('--card-bg'), pointBorderColor: '#54c79f', pointBorderWidth: 2 }] },
                        'pie',
                        { labels: ['Выиграны', 'Отклонены'], datasets: [{ data: [won.length, rejected.length], backgroundColor: ['#41bd97', '#3a4a55'], borderColor: cssVar('--card-bg'), borderWidth: 3, hoverOffset: 6 }] }
                    );
                }
            } catch (error) { console.error(error); }
        }

        function renderCharts(typeMain, dataMain, typeSecondary, dataSecondary) {
            const themeOpts = getChartThemeOptions();
            if (chartInstanceMain) chartInstanceMain.destroy();
            if (chartInstanceSecondary) chartInstanceSecondary.destroy();
            chartInstanceMain = new Chart(document.getElementById('mainChart').getContext('2d'), { type: typeMain, data: dataMain, options: themeOpts });
            const sOpts = JSON.parse(JSON.stringify(themeOpts)); delete sOpts.scales;
            chartInstanceSecondary = new Chart(document.getElementById('secondaryChart').getContext('2d'), { type: typeSecondary, data: dataSecondary, options: sOpts });
        }
    </script>
</body>
</html>
