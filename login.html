<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Вход</title>
    <script>if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <link rel="stylesheet" href="assets/theme.css">
    <style>
        body { display: flex; min-height: 100vh; }

        .theme-toggle-fab {
            position: fixed; top: 20px; right: 20px; width: 42px; height: 42px; border-radius: 12px;
            background: var(--inner-bg); border: 1px solid var(--inner-border); color: var(--text-primary);
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s ease, border-color 0.15s ease; z-index: 10;
        }
        .theme-toggle-fab:hover { transform: translateY(-1px); border-color: var(--secondary-btn-border); }

        .auth-page { display: flex; width: 100%; min-height: 100vh; }

        .auth-branding {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 32px;
            background:
                radial-gradient(80% 90% at 100% 50%, #11343a 0%, transparent 70%),
                radial-gradient(120% 80% at 50% 100%, #0e3a3f 0%, #0a242b 38%, #06141a 70%, #040c11 100%);
            position: relative;
        }
        .auth-branding img { width: 64px; height: 64px; margin-bottom: 18px; }
        .auth-branding .b2b-word { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; color: #e9eef2; }
        .auth-branding .neft-word { font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #cdd8de; margin-top: 4px; }
        .auth-branding .tagline { font-size: 13px; color: #7e8b97; margin-top: 22px; max-width: 240px; line-height: 1.5; }
        .auth-branding .auth-footer { position: absolute; bottom: 28px; left: 0; right: 0; font-size: 9.5px; color: #52606b; }

        .auth-form-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .auth-container { width: 420px; max-width: 100%; }
        .auth-container h1 { font-size: 21px; font-weight: 800; color: var(--text-primary-alt); margin-bottom: 6px; }
        .auth-container p.subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }

        .tabs { display: flex; gap: 4px; background: var(--inner-bg); border: 1px solid var(--inner-border); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 9px; transition: background-color 0.2s ease, color 0.2s ease; }
        .tab.active { background: var(--accent-gradient); color: var(--accent-on-button); }

        .form-row-between { display: flex; justify-content: space-between; align-items: center; margin: -4px 0 18px; font-size: 12.5px; }
        .forgot-link { color: var(--accent-bright); }

        .reg-only { display: none; }

        .security-note { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-secondary); margin: 4px 0 18px; }
        .security-note svg { flex-shrink: 0; }

        .btn-auth {
            width: 100%; height: var(--btn-height); background: var(--accent-gradient); color: var(--accent-on-button);
            border: none; border-radius: var(--radius-btn); font-size: 14px; font-weight: 700; cursor: pointer;
            margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: filter 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-auth:hover { filter: brightness(1.05); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(65, 189, 151, 0.28); }
        .btn-auth:active { transform: translateY(0); }

        .form-group { margin-bottom: 16px; }

        @media (max-width: 760px) {
            .auth-page { flex-direction: column; }
            .auth-branding { width: 100%; padding: 32px 24px; }
            .auth-branding .auth-footer { position: static; margin-top: 18px; }
            .auth-form-panel { padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle-fab" onclick="toggleTheme()" title="Переключить тему">
        <span id="themeIcon">🌙</span>
    </button>

    <div class="auth-page">
        <div class="auth-branding">
            <img src="assets/icons_svg/logo_hex.svg" alt="">
            <div class="b2b-word">B2B</div>
            <div class="neft-word">НЕФТЕСЕРВИС</div>
            <div class="tagline">Единая цифровая среда для закупок и поставщиков</div>
            <div class="auth-footer">© 2026 B2B Нефтесервис. Все права защищены.</div>
        </div>

        <div class="auth-form-panel">
            <div class="auth-container">
                <h1 id="authTitle">Добро пожаловать</h1>
                <p class="subtitle" id="authSubtitle">Войдите в свой аккаунт</p>

                <div class="tabs">
                    <div class="tab active" onclick="switchTab('login')">Вход</div>
                    <div class="tab" onclick="switchTab('register')">Регистрация</div>
                </div>

                <form id="authForm" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>Email или логин</label>
                        <input type="email" id="authEmail" required placeholder="user@company.com">
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="authPassword" required placeholder="••••••••••••">
                    </div>

                    <div class="form-row-between login-only">
                        <label class="checkbox-row"><input type="checkbox" id="rememberMe">Запомнить меня</label>
                        <a href="#" class="forgot-link" onclick="return false;">Забыли пароль?</a>
                    </div>

                    <div class="form-group reg-only">
                        <label>Название компании</label>
                        <input type="text" id="regCompany" placeholder="ООО «НефтьПром»">
                    </div>

                    <div class="form-group reg-only">
                        <label>ИНН</label>
                        <input type="text" id="regInn" placeholder="7701234567">
                    </div>

                    <div class="form-group reg-only">
                        <label>Роль в системе</label>
                        <select id="regRole" style="width:100%; height:var(--input-height); background:var(--input-bg); border:1px solid var(--input-border); border-radius:var(--radius-input); color:var(--text-primary); padding:0 14px; font-size:13px; outline:none;">
                            <option value="customer">Заказчик (Размещение тендеров)</option>
                            <option value="producer">Производитель (Подача КП)</option>
                        </select>
                    </div>

                    <div class="security-note reg-only">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5aa888" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
                        Данные защищены и не передаются третьим лицам
                    </div>

                    <button type="submit" class="btn-auth" id="btnSubmit">
                        Войти в систему
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#eafaf4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const tabs = document.querySelectorAll('.tab');
            const regFields = document.querySelectorAll('.reg-only');
            const loginFields = document.querySelectorAll('.login-only');
            const btnSubmit = document.getElementById('btnSubmit');
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');

            tabs.forEach(t => t.classList.remove('active'));
            if (mode === 'login') {
                tabs[0].classList.add('active');
                regFields.forEach(f => f.style.display = 'none');
                loginFields.forEach(f => f.style.display = 'flex');
                btnSubmit.innerHTML = 'Войти в систему<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#eafaf4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>';
                title.innerText = 'Добро пожаловать';
                subtitle.innerText = 'Войдите в свой аккаунт';
                document.getElementById('regCompany').removeAttribute('required');
                document.getElementById('regInn').removeAttribute('required');
            } else {
                tabs[1].classList.add('active');
                regFields.forEach(f => f.style.display = 'flex');
                loginFields.forEach(f => f.style.display = 'none');
                btnSubmit.innerHTML = 'Зарегистрироваться<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#eafaf4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>';
                title.innerText = 'Регистрация компании';
                subtitle.innerText = 'Заполните данные для регистрации';
                document.getElementById('regCompany').setAttribute('required', 'true');
                document.getElementById('regInn').setAttribute('required', 'true');
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (currentMode === 'login') {
                try {
                    const response = await fetch(`${SERVER_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('userRole', data.role);
                        localStorage.setItem('userCompany', data.company || 'ООО «Завод Исполнитель»');
                        window.location.href = data.role === 'customer' ? 'index.html' : 'producer.html';
                        return;
                    }

                    alert(data.error || 'Неверный логин или пароль');
                    return;
                } catch (error) {
                    console.warn('Backend недоступен, включаю локальную MVP-имитацию входа:', error);
                    const savedRole = localStorage.getItem('mockRole');
                    const isProducer = savedRole ? (savedRole === 'producer') : (email.includes('prod') || email.includes('zavod'));
                    localStorage.setItem('authToken', 'mock-valid-token');
                    localStorage.setItem('userRole', isProducer ? 'producer' : 'customer');
                    if (!localStorage.getItem('userCompany')) {
                        localStorage.setItem('userCompany', isProducer ? 'ООО «УралПолимер»' : 'АО «ГазНефтьЗаказ»');
                    }
                    window.location.href = isProducer ? 'producer.html' : 'index.html';
                }

            } else {
                const company = document.getElementById('regCompany').value.trim();
                const inn = document.getElementById('regInn').value.trim();
                const role = document.getElementById('regRole').value;

                try {
                    const response = await fetch(`${SERVER_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, company, inn, role })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        switchTab('login');
                        document.getElementById('authEmail').value = email;
                        return;
                    }

                    alert(data.error || 'Ошибка при регистрации');
                    return;
                } catch (error) {
                    console.warn('Backend недоступен, сохраняю регистрацию локально (MVP-имитация):', error);
                    localStorage.setItem('userCompany', company);
                    localStorage.setItem('mockRole', role);
                    switchTab('login');
                    document.getElementById('authEmail').value = email;
                }
            }
        }
    </script>
</body>
</html>
