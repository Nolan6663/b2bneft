<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Платформа - Авторизация</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --border-color: rgba(15, 23, 42, 0.08);
            --input-bg: #f1f5f9;
            --input-text: #0f172a;
        }

        body.dark-mode {
            --bg-main: #0b1220;
            --bg-card: rgba(17, 24, 39, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --input-bg: #0f172a;
            --input-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 24px;
            width: 440px;
            max-width: 100%;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .auth-logo img { width: 28px; height: 28px; }

        .auth-logo span {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .tabs {
            display: flex;
            gap: 28px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .tab {
            padding: 10px 2px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--input-text);
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-row-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -6px 0 18px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
        }

        .remember-me input { accent-color: var(--accent); }

        .forgot-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-auth {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .reg-only {
            display: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .auth-footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="assets/icons_svg/logo_hex.svg" alt="">
                <span>B2B Платформа</span>
            </div>
            <p id="authSubtitle" style="color: var(--text-muted); font-size: 14px;">Войдите в свой аккаунт</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вход</div>
            <div class="tab" onclick="switchTab('register')">Регистрация</div>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label>Email / Логин</label>
                <input type="email" id="authEmail" required placeholder="example@company.com">
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="authPassword" required placeholder="••••••••">
            </div>

            <div class="form-row-between login-only">
                <label class="remember-me"><input type="checkbox" id="rememberMe">Запомнить меня</label>
                <a href="#" class="forgot-link" onclick="return false;">Забыли пароль?</a>
            </div>

            <div class="form-group reg-only">
                <label>Название организации</label>
                <input type="text" id="regCompany" placeholder="ООО «НефтьПром»">
            </div>

            <div class="form-group reg-only">
                <label>ИНН организации</label>
                <input type="text" id="regInn" placeholder="10-значный код">
            </div>

            <div class="form-group reg-only">
                <label>Тип аккаунта (Роль)</label>
                <select id="regRole">
                    <option value="customer">Заказчик (Размещение тендеров)</option>
                    <option value="producer">Производитель (Подача КП)</option>
                </select>
            </div>

            <button type="submit" class="btn-auth" id="btnSubmit">Войти</button>
        </form>

        <div class="auth-footer">© B2B Платформа. Все права защищены.</div>
    </div>

    <script>
        const SERVER_URL = 'https://b2b-neft-backend.onrender.com/api';
        let currentMode = 'login';

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        function switchTab(mode) {
            currentMode = mode;
            const tabs = document.querySelectorAll('.tab');
            const regFields = document.querySelectorAll('.reg-only');
            const loginFields = document.querySelectorAll('.login-only');
            const btnSubmit = document.getElementById('btnSubmit');
            const subtitle = document.getElementById('authSubtitle');

            tabs.forEach(t => t.classList.remove('active'));
            if(mode === 'login') {
                tabs[0].classList.add('active');
                regFields.forEach(f => f.style.display = 'none');
                loginFields.forEach(f => f.style.display = 'flex');
                btnSubmit.innerText = 'Войти';
                subtitle.innerText = 'Войдите в свой аккаунт';
                document.getElementById('regCompany').removeAttribute('required');
                document.getElementById('regInn').removeAttribute('required');
            } else {
                tabs[1].classList.add('active');
                regFields.forEach(f => f.style.display = 'flex');
                loginFields.forEach(f => f.style.display = 'none');
                btnSubmit.innerText = 'Зарегистрироваться';
                subtitle.innerText = 'Создайте профиль компании';
                document.getElementById('regCompany').setAttribute('required', 'true');
                document.getElementById('regInn').setAttribute('required', 'true');
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (currentMode === 'login') {
                try {
                    const response = await fetch(`${SERVER_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('userRole', data.role);
                        localStorage.setItem('userCompany', data.company || 'ООО «Завод Исполнитель»');

                        window.location.href = data.role === 'customer' ? 'index.html' : 'producer.html';
                        return;
                    }

                    if (response.status !== 404) {
                        const err = await response.json();
                        alert(err.error || 'Неверный логин или пароль');
                        return;
                    }
                } catch (error) {
                    console.log('Бэкенд-роуты не найдены, включаем режим MVP-симуляции...');
                }

                // --- ИСПРАВЛЕННЫЙ ФОЛБЕК ВХОДА ДЛЯ СИМУЛЯЦИИ ---
                alert('Уведомление: Бэкенд авторизации (404) не найден. Включаю локальный тестовый режим!');

                // Сначала проверяем, какую роль мы сохранили при регистрации.
                // Если там пусто, то падаем на проверку по тексту почты.
                const savedRole = localStorage.getItem('mockRole');
                const isProducer = savedRole ? (savedRole === 'producer') : (email.includes('prod') || email.includes('zavod'));

                localStorage.setItem('authToken', 'mock-valid-jwt-token-12345');
                localStorage.setItem('userRole', isProducer ? 'producer' : 'customer');

                // Если при регистрации имя компании не сохранилось, даем дефолтное
                if (!localStorage.getItem('userCompany')) {
                    localStorage.setItem('userCompany', isProducer ? 'ООО «УралПолимер»' : 'АО «ГазНефтьЗаказ»');
                }

                window.location.href = isProducer ? 'producer.html' : 'index.html';

            } else {
                // --- РЕЖИМ РЕГИСТРАЦИИ ---
                const company = document.getElementById('regCompany').value.trim();
                const inn = document.getElementById('regInn').value.trim();
                const role = document.getElementById('regRole').value;

                try {
                    const response = await fetch(`${SERVER_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, company, inn, role })
                    });

                    if (response.ok) {
                        alert('Регистрация на сервере успешна! Теперь воспользуйтесь входом.');
                        switchTab('login');
                        return;
                    }

                    if (response.status !== 404) {
                        const err = await response.json();
                        alert(err.error || 'Ошибка при регистрации');
                        return;
                    }
                } catch (error) {
                    console.log('Бэкенд-роуты не найдены, симулируем регистрацию...');
                }

                // КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Запоминаем роль и компанию в сессию для последующего входа
                alert(`Локальный режим: Профиль компании «${company}» сохранен как ${role === 'producer' ? 'Производитель' : 'Заказчик'}!`);
                localStorage.setItem('userCompany', company);
                localStorage.setItem('mockRole', role); // Сохраняем истинную роль

                switchTab('login');
                document.getElementById('authEmail').value = email;
            }
        }
    </script>
</body>
</html>
