<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Платформа - Авторизация</title>
    <style>
        :root {
            --bg-main: #030712;
            --bg-card: rgba(17, 24, 39, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: #0f172a;
            --input-text: #ffffff;
            --blur-effect: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--blur-effect);
            padding: 40px;
            border-radius: 24px;
            width: 440px;
            max-width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            background: var(--input-bg);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
        }

        .tab.active {
            background: var(--accent-blue);
            color: white;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--input-text);
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .btn-auth {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .reg-only {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>B2B Нефтесервис</h1>
            <p id="authSubtitle" style="color: var(--text-muted); font-size: 14px;">Войдите в свой аккаунт</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вход</div>
            <div class="tab" onclick="switchTab('register')">Регистрация</div>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label>Email / Логин</label>
                <input type="email" id="authEmail" required placeholder="example@company.com">
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="authPassword" required placeholder="••••••••">
            </div>

            <div class="form-group reg-only">
                <label>Название организации</label>
                <input type="text" id="regCompany" placeholder="ООО «НефтьПром»">
            </div>

            <div class="form-group reg-only">
                <label>ИНН организации</label>
                <input type="text" id="regInn" placeholder="10-значный код">
            </div>

            <div class="form-group reg-only">
                <label>Тип аккаунта (Роль)</label>
                <select id="regRole">
                    <option value="customer">Заказчик (Размещение тендеров)</option>
                    <option value="producer">Производитель (Подача КП)</option>
                </select>
            </div>

            <button type="submit" class="btn-auth" id="btnSubmit">Войти</button>
        </form>
    </div>

    <script>
        const SERVER_URL = 'https://b2b-neft-backend.onrender.com/api';
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            const tabs = document.querySelectorAll('.tab');
            const regFields = document.querySelectorAll('.reg-only');
            const btnSubmit = document.getElementById('btnSubmit');
            const subtitle = document.getElementById('authSubtitle');

            tabs.forEach(t => t.classList.remove('active'));
            if(mode === 'login') {
                tabs[0].classList.add('active');
                regFields.forEach(f => f.style.display = 'none');
                btnSubmit.innerText = 'Войти';
                subtitle.innerText = 'Войдите в свой аккаунт';
                document.getElementById('regCompany').removeAttribute('required');
                document.getElementById('regInn').removeAttribute('required');
            } else {
                tabs[1].classList.add('active');
                regFields.forEach(f => f.style.display = 'flex');
                btnSubmit.innerText = 'Зарегистрироваться';
                subtitle.innerText = 'Создайте профиль компании';
                document.getElementById('regCompany').setAttribute('required', 'true');
                document.getElementById('regInn').setAttribute('required', 'true');
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            
            if (currentMode === 'login') {
                try {
                    const response = await fetch(`${SERVER_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Сохраняем сессию в браузер
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('userRole', data.role); // customer или producer
                        
                        // Перенаправляем в зависимости от роли
                        if (data.role === 'customer') {
                            window.location.href = 'index.html';
                        } else {
                            window.location.href = 'producer.html';
                        }
                    } else {
                        const err = await response.json();
                        alert(e.error || 'Неверный логин или пароль');
                    }
                } catch (error) {
                    console.error('Ошибка авторизации:', error);
                    alert('Ошибка соединения с сервером');
                }
            } else {
                // РЕЖИМ РЕГИСТРАЦИИ
                const company = document.getElementById('regCompany').value.trim();
                const inn = document.getElementById('regInn').value.trim();
                const role = document.getElementById('regRole').value;

                try {
                    const response = await fetch(`${SERVER_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, company, inn, role })
                    });

                    if (response.ok) {
                        alert('Регистрация успешна! Теперь вы можете войти.');
                        switchTab('login');
                    } else {
                        const err = await response.json();
                        alert(err.error || 'Ошибка при регистрации');
                    }
                } catch (error) {
                    console.error('Ошибка регистрации:', error);
                }
            }
        }
    </script>
</body>
</html>
