<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Заказы</title>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');</script>
    <style>html{background:#fff}[data-theme="dark"]{background:#0F172A}</style>
    <link rel="stylesheet" href="assets/theme-v2.css">
    <style>

        .filter-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .filter-tab {
            padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--inner-border);
            background: transparent; color: var(--text-secondary);
            transition: border-color .15s, color .15s, background .15s;
        }
        .filter-tab.active { background: var(--accent-gradient); color: var(--accent-on-button); border-color: transparent; }
        .filter-tab:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-primary); }

        .deals-list { display: flex; flex-direction: column; gap: 12px; }

        .deal-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-card);
            padding: 18px 20px;
            transition: border-color .15s;
        }
        .deal-card:hover { border-color: rgba(8,145,178,.3); }
        .deal-card.row-selected { border-color: var(--accent-cyan) !important; background: var(--bg-section) !important; }

        .deal-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .deal-card-title { font-size: 14.5px; font-weight: 700; color: var(--text-primary-alt); margin-bottom: 6px; }
        .deal-card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        .deal-status {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
            white-space: nowrap; flex-shrink: 0;
        }
        .deal-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .deal-status.active  { background: rgba(8,145,178,.12); border: 1px solid rgba(8,145,178,.25); color: var(--accent-bright); }
        .deal-status.done    { background: rgba(148,163,184,.1); border: 1px solid rgba(148,163,184,.2); color: var(--text-secondary); }

        .deal-info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px 20px;
            padding: 14px 0;
            border-top: 1px solid var(--inner-border);
            border-bottom: 1px solid var(--inner-border);
            margin-bottom: 14px;
        }
        @media (max-width: 700px) { .deal-info-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 480px) {
            .deal-card-top { flex-wrap: wrap; }
            .kpi-strip { grid-template-columns: 1fr 1fr; }
            .deal-card { padding: 14px 16px; }
        }

        .deal-info-label { font-size: 11.5px; color: var(--text-secondary); margin-bottom: 3px; }
        .deal-info-value { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
        .deal-info-value a { color: var(--accent-bright); text-decoration: none; }
        .deal-info-value a:hover { text-decoration: underline; }

        .deal-card-actions { display: flex; gap: 8px; align-items: center; }

        .btn-deal-chat {
            display: inline-flex; align-items: center; gap: 6px;
            height: 34px; padding: 0 14px; font-size: 12.5px; font-weight: 600;
            border-radius: var(--radius-btn); text-decoration: none;
            background: transparent; border: 1px solid var(--secondary-btn-border);
            color: var(--secondary-btn-text); cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        .btn-deal-chat:hover { border-color: var(--accent-bright); color: var(--accent-bright); }

        .btn-complete {
            height: 34px; padding: 0 14px; font-size: 12.5px; font-weight: 600;
            border-radius: var(--radius-btn); cursor: pointer;
            background: transparent; border: 1px solid rgba(8,145,178,.4);
            color: var(--accent-bright);
            transition: background .15s, border-color .15s;
        }
        .btn-complete:hover { background: rgba(8,145,178,.1); border-color: var(--accent-bright); }

        .deals-empty {
            text-align: center; padding: 80px 20px;
            color: var(--text-secondary); font-size: 14px; line-height: 1.7;
        }
        .deals-empty-icon { font-size: 36px; opacity: .3; margin-bottom: 14px; }
    </style>
</head>

<script>
function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    isDark ? document.documentElement.removeAttribute('data-theme') : document.documentElement.setAttribute('data-theme','dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    const cb = document.getElementById('themeCheckbox'), lbl = document.getElementById('themeLabel');
    const icon = document.getElementById('themeIcon');
    if (cb) cb.checked = !isDark;
    if (lbl) lbl.textContent = isDark ? '☀ Светлая тема' : '🌙 Тёмная тема';
    if (icon) icon.textContent = isDark ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const cb = document.getElementById('themeCheckbox'), lbl = document.getElementById('themeLabel');
    const icon = document.getElementById('themeIcon');
    if (cb) cb.checked = isDark;
    if (lbl) lbl.textContent = isDark ? '🌙 Тёмная тема' : '☀ Светлая тема';
    if (icon) icon.textContent = isDark ? '🌙' : '☀️';
});
</script>
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = 'login.html';

        const userRole  = localStorage.getItem('userRole');
        const myCompany = localStorage.getItem('userCompany');
        const token     = localStorage.getItem('authToken');
        let allDeals    = [];
        let currentFilter = 'all';

        window.addEventListener('DOMContentLoaded', async () => {
            const mainLink = document.getElementById('mainCabinetLink');
            if (mainLink) mainLink.href = userRole === 'customer' ? 'index.html' : 'producer.html';
            const navProposals = document.getElementById('navProposals');
            if (navProposals) navProposals.style.display = userRole === 'customer' ? 'none' : '';

            document.getElementById('pageTitle').textContent =
                userRole === 'customer' ? 'Мои заказы' : 'Выигранные сделки';
            document.getElementById('kpiAmountLabel').textContent =
                userRole === 'customer' ? 'Сумма закупок' : 'Сумма выручки';

            try {
                const r = await fetch(`${SERVER_URL}/companies`, { headers: { 'Authorization': 'Bearer ' + token } });
                if (r.ok) {
                    const companies = await r.json();
                    const mine = companies.find(c => c.company === myCompany && c.role === userRole);
                    if (mine) {
                        const spl = document.getElementById('sidebarProfileLink');
                        if (spl) { spl.href = `company-profile.html?id=${mine.id}`; spl.style.display = ''; }
                    }
                }
            } catch {}

            await loadDeals();
            initNotifications();
            initSidebarBadges();
        });

        async function loadDeals() {
            try {
                const r = await fetch(`${SERVER_URL}/deals`, { headers: { 'Authorization': 'Bearer ' + token } });
                if (!r.ok) throw new Error();
                allDeals = await r.json();
                updateKPI();
                renderDeals();
            } catch {
                document.getElementById('dealsList').innerHTML =
                    '<div class="deals-empty"><div class="deals-empty-icon">⚠️</div>Не удалось загрузить данные</div>';
            }
        }

        function updateKPI() {
            const active    = allDeals.filter(d => d.completionStatus === 'active').length;
            const completed = allDeals.filter(d => d.completionStatus === 'completed').length;
            const total     = allDeals.reduce((s, d) => s + (d.price || 0) * (d.quantity || 1), 0);

            document.getElementById('kpiTotal').textContent     = allDeals.length;
            document.getElementById('kpiActive').textContent    = active;
            document.getElementById('kpiCompleted').textContent = completed;
            document.getElementById('kpiAmount').textContent    = total > 0
                ? total.toLocaleString('ru-RU') + ' ₽' : '—';
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-tab').forEach(t =>
                t.classList.toggle('active', t.dataset.filter === f));
            renderDeals();
        }

        function renderDeals() {
            const list = currentFilter === 'all' ? allDeals
                : allDeals.filter(d =>
                    currentFilter === 'active'    ? d.completionStatus === 'active'
                    : currentFilter === 'completed' ? d.completionStatus === 'completed'
                    : true);

            const container = document.getElementById('dealsList');
            if (list.length === 0) {
                const msg = currentFilter === 'active'    ? 'Нет активных сделок'
                          : currentFilter === 'completed' ? 'Нет завершённых сделок'
                          : userRole === 'customer'       ? 'Вы ещё не приняли ни одного предложения'
                          :                                 'Ваши предложения пока не были приняты';
                const hint = currentFilter === 'all'
                    ? (userRole === 'customer'
                        ? '<br><a href="index.html" style="color:var(--accent-bright);text-decoration:underline;">Перейти к закупкам →</a>'
                        : '<br><a href="proposals.html" style="color:var(--accent-bright);text-decoration:underline;">Мои отклики →</a>')
                    : '';
                container.innerHTML = `<div class="deals-empty"><div class="deals-empty-icon">📋</div>${escapeHtml(msg)}${hint}</div>`;
                return;
            }
            container.innerHTML = '';
            list.forEach(d => container.appendChild(buildDealCard(d)));
        }

        function showDealPanel(d) {
            const panel = document.getElementById('dealDetailPanel');
            if (!panel) return;
            panel.style.display = 'block';

            document.getElementById('dealPanelTitle').textContent = d.title || '—';
            const isActive = d.completionStatus === 'active';
            document.getElementById('dealPanelStatus').innerHTML = isActive
                ? '<span class="deal-status active">В работе</span>'
                : '<span class="deal-status done">Выполнен</span>';

            const date = d.dealDate ? new Date(d.dealDate).toLocaleDateString('ru-RU') : '—';
            const partner = userRole === 'customer' ? d.counterparty : myCompany;
            const partnerLabel = userRole === 'customer' ? 'Исполнитель' : 'Заказчик';

            document.getElementById('dealPanelMeta').innerHTML = [
                [partnerLabel, escapeHtml(partner || '—'), ''],
                d.category ? ['Категория', escapeHtml(d.category), ''] : null,
                d.price ? ['Цена', d.price.toLocaleString('ru-RU') + ' ₽', 'font-weight:600;font-family:"JetBrains Mono",monospace;'] : null,
                d.days ? ['Срок', d.days + ' дней', 'font-weight:600;'] : null,
                ['Дата сделки', date, 'font-family:"JetBrains Mono",monospace;'],
            ].filter(Boolean).map(([label, val, style]) => `
                <div style="display:grid;grid-template-columns:80px 1fr;gap:8px;font-size:12.5px;">
                    <span style="color:var(--text-secondary);">${label}</span>
                    <span style="${style}">${val}</span>
                </div>`).join('');

            const chatCompany = userRole === 'customer' ? d.counterparty : myCompany;
            const chatHref = `messages.html?orderId=${d.orderId}&company=${encodeURIComponent(chatCompany || '')}`;
            const completeBtn = (userRole === 'customer' && isActive)
                ? `<button class="btn-complete" style="flex:1;" onclick="completeDeal(${d.proposalId})">Завершить сделку</button>`
                : '';
            document.getElementById('dealPanelActions').innerHTML = `
                <a href="${chatHref}" class="btn-deal-chat" style="flex:1;justify-content:center;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Чат
                </a>
                ${completeBtn}`;

            document.getElementById('dealPanelStages').innerHTML = d.description
                ? `<div style="font-size:12.5px;color:var(--text-secondary);line-height:1.5;">${escapeHtml(d.description.slice(0, 200))}${d.description.length > 200 ? '…' : ''}</div>`
                : '<div style="font-size:12.5px;color:var(--text-secondary);">Нет описания</div>';
        }

        function buildDealCard(d) {
            const card = document.createElement('div');
            card.className = 'deal-card';
            card.style.cursor = 'pointer';

            const isActive = d.completionStatus === 'active';
            const statusHtml = isActive
                ? '<span class="deal-status active">В работе</span>'
                : '<span class="deal-status done">Выполнен</span>';

            const date = d.dealDate
                ? new Date(d.dealDate).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' })
                : '—';

            const counterpartyHtml = d.counterpartyProfileId
                ? `<a href="company-profile.html?id=${d.counterpartyProfileId}">${escapeHtml(d.counterparty || '—')}</a>`
                : escapeHtml(d.counterparty || '—');

            const chatCompany = userRole === 'customer' ? d.counterparty : myCompany;
            const chatHref = `messages.html?orderId=${d.orderId}&company=${encodeURIComponent(chatCompany || '')}`;

            const completeBtn = (userRole === 'customer' && isActive)
                ? `<button class="btn-complete" onclick="event.stopPropagation();completeDeal(${d.proposalId})">Завершить сделку</button>`
                : '';

            const catBadge = d.category
                ? `<span class="badge-category" style="font-size:11.5px;padding:3px 8px;border-radius:8px;background:rgba(8,145,178,.1);border:1px solid rgba(8,145,178,.2);color:var(--accent-bright);">${escapeHtml(d.category)}</span>`
                : '';

            card.innerHTML = `
                <div class="deal-card-top">
                    <div>
                        <div class="deal-card-title">${escapeHtml(d.title)}</div>
                        <div class="deal-card-meta">
                            ${catBadge}
                            ${d.quantity ? `<span style="font-size:12px;color:var(--text-secondary)">${d.quantity}${d.unit ? ' ' + escapeHtml(d.unit) : ''}</span>` : ''}
                        </div>
                    </div>
                    ${statusHtml}
                </div>
                <div class="deal-info-grid">
                    <div>
                        <div class="deal-info-label">${userRole === 'customer' ? 'Исполнитель' : 'Заказчик'}</div>
                        <div class="deal-info-value">${counterpartyHtml}</div>
                    </div>
                    <div>
                        <div class="deal-info-label">Цена</div>
                        <div class="deal-info-value">${d.price ? d.price.toLocaleString('ru-RU') + ' ₽' + (d.unit ? '/' + escapeHtml(d.unit) : '') : '—'}</div>
                    </div>
                    <div>
                        <div class="deal-info-label">Срок поставки</div>
                        <div class="deal-info-value">${d.days ? d.days + ' дней' : '—'}</div>
                    </div>
                    <div>
                        <div class="deal-info-label">Дата сделки</div>
                        <div class="deal-info-value">${date}</div>
                    </div>
                </div>
                <div class="deal-card-actions">
                    <a href="${chatHref}" class="btn-deal-chat" onclick="event.stopPropagation()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Написать
                    </a>
                    ${completeBtn}
                </div>`;
            card.onclick = () => {
                document.querySelectorAll('.deal-card').forEach(c => c.classList.remove('row-selected'));
                card.classList.add('row-selected');
                showDealPanel(d);
            };
            return card;
        }

        async function completeDeal(proposalId) {
            if (!confirm('Подтвердить выполнение сделки?\nИсполнитель получит уведомление. Действие нельзя отменить.')) return;
            try {
                const r = await fetch(`${SERVER_URL}/deals/${proposalId}/complete`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await r.json();
                if (r.ok) {
                    await loadDeals();
                } else {
                    alert(data.error || 'Ошибка');
                }
            } catch {
                alert('Сервер недоступен');
            }
        }
    </script>
</body>
</html>
