services:
  - type: web
    name: b2bneft
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: MAP_PROVIDER
        value: yandex
      - key: YANDEX_MAPS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SITE_URL
        sync: false
      - key: YANDEX_WEBMASTER_TOKEN
        sync: false
      - key: YANDEX_WEBMASTER_HOST_ID
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_PUBLIC_URL
        sync: false
      - key: SEED_ADMIN
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
