<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Мои отклики</title>
    <link rel="stylesheet" href="assets/theme.css">
    <style>
        .table-wrapper { width: 100%; overflow-x: auto; }
        .actions-cell { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-action { padding: 7px 14px; border-radius: 7px; font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--secondary-btn-border); background: transparent; color: var(--secondary-btn-text); transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease; }
        .btn-action:hover { transform: translateY(-1px); }
        .btn-action.edit:hover { border-color: #7eb2e8; color: #7eb2e8; }
        .btn-action.withdraw:hover { border-color: var(--error); color: var(--error); }

        .mobile-proposals-list { display: none; flex-direction: column; gap: 16px; }
        @media (max-width: 768px) {
            .table-wrapper { display: none; }
            .mobile-proposals-list { display: flex; }
            .mobile-card { background: var(--inner-bg); border: 1px solid var(--inner-border); border-radius: var(--radius-inner); padding: 18px; display: flex; flex-direction: column; gap: 10px; }
            .mobile-card h4 { font-size: 14px; font-weight: 700; }
            .mobile-card .meta-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-tertiary); }
            .mobile-card .actions-row { display: flex; gap: 10px; margin-top: 8px; }
            .mobile-card .actions-row .btn-action { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><img src="assets/icons_svg/logo_hex.svg" alt=""><span>B2B НЕФТЕСЕРВИС</span></div>
        <a href="producer.html"><img class="nav-icon" src="assets/icons_svg/home.svg" alt="">Актуальные закупки</a>
        <a href="proposals.html" class="active"><img class="nav-icon" src="assets/icons_svg/reply.svg" alt="">Мои отклики</a>
        <a href="partners.html"><img class="nav-icon" src="assets/icons_svg/users.svg" alt="">Контрагенты</a>
        <a href="analytics.html"><img class="nav-icon" src="assets/icons_svg/chart.svg" alt="">Аналитика</a>

        <div class="sidebar-bottom">
            <a href="#" class="switch-link" onclick="logout(); return false;">Выйти из аккаунта</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Направленные коммерческие предложения (КП)</h2>
            <button class="bell-btn" onclick="openNotificationsModal()">
                <img src="assets/icons_svg/bell.svg" alt="" style="width:18px;height:18px;">
                <span class="bell-badge" id="bellBadge">0</span>
            </button>
        </div>

        <div class="section">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Закупка</th>
                            <th>Предложенная цена</th>
                            <th>Срок поставки</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="desktopProposalsBody"></tbody>
                </table>
            </div>
            <div class="mobile-proposals-list" id="mobileProposalsBody"></div>
        </div>
    </div>

    <div class="modal" id="editProposalModal">
        <div class="modal-content">
            <h3>Изменение условий КП</h3>
            <div class="form-group">
                <label>Новая цена, ₽/шт</label>
                <input type="number" id="editPrice">
            </div>
            <div class="form-group">
                <label>Новый срок (дней)</label>
                <input type="number" id="editDays">
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeEditModal()">Отмена</button>
                <button class="btn-modal-submit" onclick="submitEditProposal()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="notificationModal">
        <div class="modal-content" style="width: 440px;">
            <h3>Уведомления платформы</h3>
            <div id="notificationsList" style="max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; background: var(--inner-bg); border-radius: 12px; border: 1px solid var(--inner-border);"></div>
            <div class="modal-actions" style="justify-content: space-between;">
                <button onclick="clearNotifications()" style="color: var(--error); border:none; background:transparent; cursor:pointer; font-size: 13px; padding: 8px 14px;">Очистить историю</button>
                <button class="btn-modal-cancel" onclick="closeNotificationsModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = 'login.html';

        const companyName = localStorage.getItem('userCompany') || 'ООО «Завод Исполнитель»';
        let currentEditingId = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadProposalsPage();
            initNotifications();
        });

        function statusIcon(status) {
            if (status === 'Выигран') return { icon: '✓', cls: 'win' };
            if (status === 'Отклонен') return { icon: '✗', cls: 'loose' };
            return { icon: '⏱', cls: 'waiting' };
        }

        async function loadProposalsPage() {
            try {
                const response = await fetch(`${SERVER_URL}/proposals`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
                });
                const allProposals = await response.json();
                const myProposals = allProposals.filter(p => p.company === companyName);

                renderDesktopTable(myProposals);
                renderMobileCards(myProposals);
            } catch (error) {
                console.error('Ошибка загрузки предложений:', error);
            }
        }

        function renderDesktopTable(list) {
            const tbody = document.getElementById('desktopProposalsBody');
            tbody.innerHTML = '';

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 50px; font-size: 14px;">
                    У компании <strong>${companyName}</strong> пока нет направленных предложений.<br>
                    <a href="producer.html" style="color: var(--accent-bright); text-decoration: underline; font-weight: 600; display: inline-block; margin-top: 10px;">Перейти к актуальным закупкам</a>
                </td></tr>`;
                return;
            }

            list.forEach(p => {
                const tr = document.createElement('tr');
                const { icon, cls } = statusIcon(p.status);
                const isEditable = p.status === 'Ожидает ответа';

                const actionsHtml = isEditable
                    ? `<button class="btn-action edit" onclick="openEditModal(${p.id}, ${p.price}, ${p.days})">Изменить</button>
                       <button class="btn-action withdraw" onclick="withdrawProposal(${p.id})">Отозвать</button>`
                    : `<span style="color:var(--text-muted); font-size:12px;">Блокировано</span>`;

                tr.innerHTML = `
                    <td><strong>${p.orderTitle || 'Закупка #' + p.orderId}</strong></td>
                    <td>${p.price.toLocaleString()} ₽/шт</td>
                    <td>${p.days} дней</td>
                    <td><span class="status-icon ${cls}">${icon} ${p.status}</span></td>
                    <td class="actions-cell">${actionsHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderMobileCards(list) {
            const container = document.getElementById('mobileProposalsBody');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-secondary); padding: 30px; border: 1px dashed var(--card-border); border-radius: 12px; font-size: 14px;">История предложений пуста</div>`;
                return;
            }

            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'mobile-card';
                const { icon, cls } = statusIcon(p.status);
                const isEditable = p.status === 'Ожидает ответа';

                const actionsHtml = isEditable
                    ? `<div class="actions-row">
                        <button class="btn-action edit" onclick="openEditModal(${p.id}, ${p.price}, ${p.days})">Изменить</button>
                        <button class="btn-action withdraw" onclick="withdrawProposal(${p.id})">Отозвать</button>
                       </div>`
                    : `<div style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:8px;">Редактирование недоступно</div>`;

                card.innerHTML = `
                    <h4>${p.orderTitle || 'Закупка #' + p.orderId}</h4>
                    <div class="meta-row"><span>Статус:</span><span class="status-icon ${cls}">${icon} ${p.status}</span></div>
                    <div class="meta-row"><span>Цена:</span><strong>${p.price.toLocaleString()} ₽/шт</strong></div>
                    <div class="meta-row"><span>Срок:</span><span>${p.days} дней</span></div>
                    ${actionsHtml}
                `;
                container.appendChild(card);
            });
        }

        function openEditModal(id, price, days) {
            currentEditingId = id;
            document.getElementById('editPrice').value = price;
            document.getElementById('editDays').value = days;
            document.getElementById('editProposalModal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('editProposalModal').style.display = 'none'; }

        async function submitEditProposal() {
            const price = parseFloat(document.getElementById('editPrice').value);
            const days = parseInt(document.getElementById('editDays').value, 10);
            if (isNaN(price) || isNaN(days) || price <= 0 || days <= 0) return alert('Ошибка ввода параметров');

            try {
                const response = await fetch(`${SERVER_URL}/proposals/${currentEditingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('authToken') },
                    body: JSON.stringify({ price, days })
                });
                if (response.ok) {
                    closeEditModal();
                    await loadProposalsPage();
                } else {
                    const err = await response.json();
                    alert(err.error || 'Не удалось изменить предложение');
                }
            } catch (error) {
                alert('Сервер недоступен, изменения не сохранены');
            }
        }

        async function withdrawProposal(id) {
            if (!confirm('Отозвать коммерческое предложение?')) return;
            try {
                const response = await fetch(`${SERVER_URL}/proposals/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
                });
                if (response.ok) {
                    await loadProposalsPage();
                } else {
                    const err = await response.json();
                    alert(err.error || 'Не удалось отозвать предложение');
                }
            } catch (error) {
                alert('Сервер недоступен, предложение не отозвано');
            }
        }
    </script>
</body>
</html>
