<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Каталог производителей</title>
    <script>if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <style>html{background:#070d12}html.light-mode{background:#f3f6f8}</style>
    <link rel="stylesheet" href="assets/theme.css">
    <style>
        /* ── Search bar ── */
        .catalog-search-row {
            display: flex; align-items: center; gap: 12px;
        }
        .catalog-search-wrap {
            flex: 1; position: relative;
        }
        .catalog-search-wrap svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-secondary); pointer-events: none;
        }
        .catalog-search-input {
            width: 100%; height: 44px; padding: 0 14px 0 42px;
            background: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: var(--radius-input); color: var(--text-primary);
            font-size: 13.5px; outline: none; font-family: inherit;
            transition: border-color 0.15s;
        }
        .catalog-search-input:focus { border-color: var(--accent-bright); }
        .catalog-search-input::placeholder { color: var(--text-secondary); }
        .catalog-count { font-size: 13px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }

        /* ── Filter chips ── */
        .catalog-filters {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .filter-chip {
            padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--inner-border);
            background: transparent; color: var(--text-secondary);
            transition: border-color .15s, color .15s, background .15s;
            font-family: inherit;
        }
        .filter-chip:hover:not(.active) { border-color: var(--text-secondary); color: var(--text-primary); }
        .filter-chip.active { background: var(--accent-gradient); color: var(--accent-on-button); border-color: transparent; }

        /* ── Producer grid ── */
        .producers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        @media (max-width: 1100px) { .producers-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px)  { .producers-grid { grid-template-columns: 1fr; } }

        /* ── Producer card ── */
        .catalog-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius-card); padding: 20px 22px;
            display: flex; flex-direction: column; gap: 14px;
            transition: border-color .15s, transform .15s, box-shadow .15s;
        }
        .catalog-card:hover {
            border-color: rgba(84,199,159,.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,.2);
        }

        .catalog-card-top {
            display: flex; align-items: flex-start; gap: 12px;
        }
        .catalog-avatar {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: #fff;
        }
        .catalog-card-main { flex: 1; min-width: 0; }
        .catalog-card-name {
            font-size: 14.5px; font-weight: 700; color: var(--text-primary-alt);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .catalog-card-loc {
            font-size: 12px; color: var(--text-secondary); margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .catalog-verified {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 700; color: var(--accent-bright);
            background: rgba(84,199,159,.1); border: 1px solid rgba(84,199,159,.25);
            padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
        }

        /* ── Capability chips ── */
        .catalog-caps { display: flex; flex-wrap: wrap; gap: 6px; }
        .catalog-cap-chip {
            background: var(--inner-bg); border: 1px solid var(--inner-border);
            border-radius: 6px; padding: 4px 10px; font-size: 11.5px;
            color: var(--text-tertiary); font-weight: 600;
        }

        /* ── Free capacity mini-bars ── */
        .catalog-capacity { display: flex; flex-direction: column; gap: 8px; }
        .catalog-capacity-title {
            font-size: 11px; color: var(--text-secondary); font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .catalog-cap-bar { display: flex; flex-direction: column; gap: 3px; }
        .catalog-cap-bar-labels {
            display: flex; justify-content: space-between;
            font-size: 11.5px; color: var(--text-secondary);
        }
        .catalog-cap-track {
            height: 5px; background: var(--inner-bg);
            border-radius: 4px; overflow: hidden; border: 1px solid var(--inner-border);
        }
        .catalog-cap-fill {
            height: 100%; border-radius: 4px;
            background: var(--accent-gradient); transition: width .4s ease;
        }

        /* ── Card CTA ── */
        .catalog-btn {
            margin-top: auto; font-size: 12.5px; height: 36px; padding: 0 14px;
            text-decoration: none; justify-content: center;
        }

        /* ── Empty / loading states ── */
        .catalog-empty {
            grid-column: 1 / -1; padding: 60px 20px; text-align: center;
            color: var(--text-secondary); font-size: 14px; display: flex;
            flex-direction: column; align-items: center; gap: 12px;
        }
        .catalog-empty svg { opacity: .25; }
        .catalog-loading {
            grid-column: 1 / -1; padding: 40px 20px; text-align: center;
            color: var(--text-secondary); font-size: 13.5px;
        }

        /* ── About snippet ── */
        .catalog-about {
            font-size: 12.5px; color: var(--text-secondary); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

        <div class="sidebar-bottom">

                <span id="themeLabel" class="theme-label">🌙 Тёмная тема</span>
                <label class="theme-switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">

    <div class="main-content">
        <div class="header">
            <div>
                <h2>Каталог производителей</h2>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="bell-btn" onclick="openNotificationsModal()">
                    <img src="assets/icons_svg/bell.svg" alt="" style="width:18px;height:18px;">
                    <span class="bell-badge" id="bellBadge">0</span>
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="catalog-search-row">
            <div class="catalog-search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input
                    type="text"
                    class="catalog-search-input"
                    id="catalogSearch"
                    placeholder="Поиск по названию, городу, специализации..."
                    oninput="onSearch(this.value)"
                >
            </div>
            <span class="catalog-count" id="catalogCount"></span>
        </div>

        <!-- Filters -->
        <div class="catalog-filters">
            <button class="filter-chip active" data-cap="" onclick="setFilter(this)">Все</button>
            <button class="filter-chip" data-cap="РТИ" onclick="setFilter(this)">РТИ</button>
            <button class="filter-chip" data-cap="Металлообработка" onclick="setFilter(this)">Металлообработка</button>
            <button class="filter-chip" data-cap="Токарка" onclick="setFilter(this)">Токарка</button>
            <button class="filter-chip" data-cap="Фрезеровка" onclick="setFilter(this)">Фрезеровка</button>
            <button class="filter-chip" data-cap="Прессование" onclick="setFilter(this)">Прессование</button>
            <button class="filter-chip" data-cap="Лазерная резка" onclick="setFilter(this)">Лазерная резка</button>
            <button class="filter-chip" data-cap="Литьё" onclick="setFilter(this)">Литьё</button>
            <button class="filter-chip" data-cap="Сварка" onclick="setFilter(this)">Сварка</button>
        </div>

        <!-- Grid -->
        <div class="producers-grid" id="producersGrid">
            <div class="catalog-loading">Загрузка каталога...</div>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = 'login.html';

        let allProducers = [];
        let activeFilter = '';
        let searchQuery  = '';

        const GRADIENTS = [
            'linear-gradient(135deg,#2f8f78,#41bd97)',
            'linear-gradient(135deg,#3a6ea5,#5b9bd5)',
            'linear-gradient(135deg,#b9852f,#d8a850)',
            'linear-gradient(135deg,#7b4fa0,#a971d8)',
            'linear-gradient(135deg,#c04b4b,#e07070)',
        ];

        async function loadCatalog() {
            try {
                const res = await apiFetch(`${SERVER_URL}/catalog`);
                if (!res.ok) throw new Error();
                allProducers = await res.json();
                render();
            } catch {
                document.getElementById('producersGrid').innerHTML =
                    `<div class="catalog-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Не удалось загрузить каталог</p></div>`;
            }
        }

        function setFilter(btn) {
            document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.cap;
            render();
        }

        function onSearch(val) {
            searchQuery = val.trim();
            render();
        }

        function filtered() {
            let list = allProducers;
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                list = list.filter(p =>
                    (p.company || '').toLowerCase().includes(q) ||
                    (p.city    || '').toLowerCase().includes(q) ||
                    (p.specialization || '').toLowerCase().includes(q) ||
                    (p.about   || '').toLowerCase().includes(q)
                );
            }
            if (activeFilter) {
                const f = activeFilter.toLowerCase();
                list = list.filter(p => {
                    const inCaps = Array.isArray(p.capabilities) &&
                        p.capabilities.some(c => c.toLowerCase().includes(f));
                    const inSpec = (p.specialization || '').toLowerCase().includes(f);
                    return inCaps || inSpec;
                });
            }
            return list;
        }

        function render() {
            const list = filtered();
            const grid = document.getElementById('producersGrid');
            const n = list.length;
            document.getElementById('catalogCount').textContent =
                n === 0 ? 'Не найдено' : `${n} производител${n === 1 ? 'ь' : n < 5 ? 'я' : 'ей'}`;

            if (n === 0) {
                grid.innerHTML = `<div class="catalog-empty">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <p>Производители не найдены.<br>Попробуйте изменить фильтр или запрос.</p>
                </div>`;
                return;
            }

            grid.innerHTML = list.map(p => cardHTML(p)).join('');
        }

        function cardHTML(p) {
            const letter = (p.company || '?').replace(/[«»"]/g, '').trim().charAt(0).toUpperCase();
            const grad   = GRADIENTS[p.id % GRADIENTS.length];

            const verBadge = p.verifiedByPlatform
                ? `<span class="catalog-verified"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Верифицирован</span>`
                : '';

            const caps = (p.capabilities || []).slice(0, 5)
                .map(c => `<span class="catalog-cap-chip">${escapeHtml(c)}</span>`)
                .join('');

            const locParts = [p.city, p.specialization].filter(Boolean);

            const capBars = (p.freeCapacity || []).slice(0, 2).map(fc => `
                <div class="catalog-cap-bar">
                    <div class="catalog-cap-bar-labels">
                        <span>${escapeHtml(fc.name)}</span>
                        <span style="color:var(--accent-bright);font-weight:700;">${fc.percent}% своб.</span>
                    </div>
                    <div class="catalog-cap-track">
                        <div class="catalog-cap-fill" style="width:${fc.percent}%"></div>
                    </div>
                </div>`).join('');

            const capacityBlock = capBars
                ? `<div class="catalog-capacity">
                       <div class="catalog-capacity-title">Свободные мощности</div>
                       ${capBars}
                   </div>`
                : '';

            const aboutBlock = p.about
                ? `<div class="catalog-about">${escapeHtml(p.about)}</div>`
                : '';

            return `
            <div class="catalog-card">
                <div class="catalog-card-top">
                    <div class="catalog-avatar" style="background:${grad}">${letter}</div>
                    <div class="catalog-card-main">
                        <div class="catalog-card-name">${escapeHtml(p.company || '—')}</div>
                        <div class="catalog-card-loc">${escapeHtml(locParts.join(' · '))}</div>
                    </div>
                    ${verBadge}
                </div>
                ${caps ? `<div class="catalog-caps">${caps}</div>` : ''}
                ${aboutBlock}
                ${capacityBlock}
                <a href="company-profile.html?id=${p.id}" class="btn-secondary catalog-btn">Открыть профиль →</a>
            </div>`;
        }

        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
</body>
