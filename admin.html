<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
    <link rel="preload" href="assets/fonts/manrope-cyrillic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>Техзаказ — Администратор</title>
    <link rel="stylesheet" href="assets/theme-v2.css?v=10">
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; background:var(--bg-page); }

        /* ── Topbar ──────────────────────────────────────────────── */
        .adm-topbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:0 28px; height:58px;
            background:var(--card-bg); border-bottom:1px solid var(--inner-border);
            flex-shrink:0; position:sticky; top:0; z-index:100;
        }
        .adm-logo { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:800; color:var(--text-primary-alt); letter-spacing:-.3px; }
        .adm-logo-sep { color:var(--text-muted); font-weight:400; margin:0 4px; }
        .adm-logo-mark { position:relative; width:30px; height:30px; border-radius:8px; background:#0B2233; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .adm-logo-mark span { font-weight:800; font-size:16px; color:#fff; line-height:1; }
        .adm-logo-mark::after { content:''; position:absolute; right:4px; bottom:4px; width:8px; height:8px; background:#FF6A00; clip-path:polygon(0 100%,100% 0,100% 100%); }
        .adm-topbar-right { display:flex; align-items:center; gap:12px; }

        /* ── Main layout ─────────────────────────────────────────── */
        .adm-main { flex:1; padding:24px 28px; max-width:1040px; width:100%; margin:0 auto; box-sizing:border-box; }

        /* ── KPI row ─────────────────────────────────────────────── */
        .adm-kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
        .adm-kpi { background:var(--card-bg); border:1px solid var(--card-border); border-radius:14px; padding:18px 20px; }
        .adm-kpi-label { font-size:11.5px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
        .adm-kpi-value { font-size:28px; font-weight:800; color:var(--text-primary-alt); line-height:1; }
        .adm-kpi-value.accent { color:var(--accent-bright); }

        /* ── Tabs ────────────────────────────────────────────────── */
        .adm-tabs-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
        .adm-tabs { display:flex; gap:3px; background:var(--inner-bg); border-radius:10px; padding:3px; }
        .adm-tab { padding:7px 18px; border-radius:8px; border:none; background:none; cursor:pointer; font-size:13.5px; font-weight:500; color:var(--text-secondary); transition:all .15s; }
        .adm-tab.active { background:var(--card-bg); color:var(--text-primary-alt); font-weight:700; box-shadow:0 1px 4px rgba(0,0,0,.12); }
        .adm-tab:hover:not(.active) { color:var(--text-primary); }
        .adm-badge { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; border-radius:9px; background:var(--accent-bright); color:#fff; font-size:10px; font-weight:800; padding:0 4px; margin-left:5px; }

        /* ── Verification cards ──────────────────────────────────── */
        .req-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:20px 24px; margin-bottom:14px; transition:box-shadow .18s; }
        .req-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.07); }
        .req-card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:14px; }
        .req-company { font-size:16px; font-weight:800; color:var(--text-primary-alt); }
        .req-meta { font-size:12px; color:var(--text-secondary); margin-top:3px; }
        .req-badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; flex-shrink:0; }
        .req-badge.pending  { background:rgba(250,204,21,.12); color:#facc15; border:1px solid rgba(250,204,21,.3); }
        .req-badge.approved { background:rgba(74,222,128,.1);  color:#4ade80; border:1px solid rgba(74,222,128,.28); }
        .req-badge.approved_auto { background:rgba(11,143,206,.12); color:#0B8FCE; border:1px solid rgba(11,143,206,.35); }
        .req-badge.rejected { background:rgba(248,113,113,.1); color:#f87171; border:1px solid rgba(248,113,113,.28); }

        .req-details { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:8px; margin-bottom:14px; }
        .req-detail { background:var(--inner-bg); border:1px solid var(--inner-border); border-radius:10px; padding:9px 12px; }
        .req-detail-lbl { font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
        .req-detail-val { font-size:13px; color:var(--text-primary-alt); font-weight:600; word-break:break-word; }

        .req-caps { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
        .cap-chip { background:var(--inner-bg); border:1px solid var(--inner-border); border-radius:6px; padding:3px 9px; font-size:11.5px; color:var(--text-secondary); }

        .req-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-approve { height:34px; padding:0 16px; border-radius:8px; border:1px solid rgba(74,222,128,.3); background:rgba(74,222,128,.1); color:#4ade80; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s; }
        .btn-approve:hover { background:rgba(74,222,128,.2); }
        .btn-reject-open { height:34px; padding:0 16px; border-radius:8px; border:1px solid rgba(248,113,113,.3); background:transparent; color:#f87171; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
        .btn-reject-open:hover { background:rgba(248,113,113,.08); }

        .reject-form { display:none; flex-direction:column; gap:8px; width:100%; margin-top:10px; }
        .reject-form.open { display:flex; }
        .reject-form textarea { resize:vertical; min-height:60px; }
        .reject-form-btns { display:flex; gap:8px; }
        .reject-comment-block { background:rgba(248,113,113,.07); border:1px solid rgba(248,113,113,.18); border-radius:8px; padding:8px 12px; font-size:13px; color:var(--text-tertiary); margin-bottom:12px; }
        .reject-comment-block strong { color:#f87171; }

        /* ── Users table ─────────────────────────────────────────── */
        .usr-table-wrap { background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; overflow:hidden; }
        .usr-table { width:100%; border-collapse:collapse; font-size:13px; }
        .usr-table th { text-align:left; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; padding:12px 16px; border-bottom:1px solid var(--inner-border); white-space:nowrap; }
        .usr-table td { padding:12px 16px; border-bottom:1px solid var(--inner-border); color:var(--text-primary); vertical-align:middle; }
        .usr-table tr:last-child td { border-bottom:none; }
        .usr-table tr:hover td { background:var(--inner-bg); }
        .role-pill { display:inline-block; padding:3px 9px; border-radius:6px; font-size:11.5px; font-weight:700; }
        .role-pill.admin    { background:rgba(129,140,248,.15); color:#818cf8; }
        .role-pill.producer { background:rgba(34,211,238,.12);  color:var(--accent-cyan); }
        .role-pill.customer { background:rgba(251,146,60,.12);  color:#fb923c; }
        .usr-del-btn { height:30px; padding:0 12px; border-radius:7px; border:1px solid rgba(248,113,113,.28); background:transparent; color:#f87171; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
        .usr-del-btn:hover { background:rgba(248,113,113,.1); }
        .usr-me { font-size:10px; color:var(--text-muted); margin-left:4px; }

        /* ── Empty / loading ─────────────────────────────────────── */
        .adm-empty { text-align:center; padding:56px 20px; color:var(--text-secondary); font-size:14px; }

        /* ── Export btn ──────────────────────────────────────────── */
        .btn-export { display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 14px; border-radius:8px; font-size:12.5px; font-weight:600; background:transparent; border:1px solid var(--inner-border); color:var(--text-secondary); cursor:pointer; transition:border-color .15s,color .15s; }
        .btn-export:hover { border-color:var(--accent-bright); color:var(--accent-bright); }

        @media(max-width:768px) {
            .adm-topbar { padding:0 14px; }
            .adm-main { padding:16px 14px 24px; }
            .adm-kpi-row { grid-template-columns:repeat(2,1fr); }
            .req-card { padding:14px 16px; }
            .usr-table th:nth-child(4), .usr-table td:nth-child(4) { display:none; }
            .req-actions .btn-approve,
            .req-actions .btn-reject-open { min-height: 44px; }
        }
        @media(max-width:480px) {
            .adm-kpi-row { grid-template-columns: 1fr; }
            .adm-tabs { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .usr-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .usr-table { min-width: 520px; }
        }
    </style>
</head>
<body>

<div class="adm-topbar">
    <div class="adm-logo">
        <div class="adm-logo-mark"><span>Т</span></div>
        ТЕХЗАКАЗ <span class="adm-logo-sep">/</span> Администратор
    </div>
    <div class="adm-topbar-right">
        <button class="btn-secondary" onclick="adminLogout()" style="height:34px;padding:0 14px;font-size:13px;">Выйти</button>
    </div>
</div>

<div class="adm-main">

    <!-- KPI -->
    <div class="adm-kpi-row" id="kpiRow">
        <div class="adm-kpi"><div class="adm-kpi-label">Пользователей</div><div class="adm-kpi-value" id="kpiUsers">—</div></div>
        <div class="adm-kpi"><div class="adm-kpi-label">На верификации</div><div class="adm-kpi-value accent" id="kpiPending">—</div></div>
        <div class="adm-kpi"><div class="adm-kpi-label">Заказов</div><div class="adm-kpi-value" id="kpiOrders">—</div></div>
        <div class="adm-kpi"><div class="adm-kpi-label">Компаний</div><div class="adm-kpi-value" id="kpiCompanies">—</div></div>
    </div>

    <!-- Tabs bar -->
    <div class="adm-tabs-bar">
        <div class="adm-tabs">
            <button class="adm-tab active" id="tabVerif" onclick="showTab('verif')">
                Верификация <span class="adm-badge" id="pendingBadge" style="display:none;"></span>
            </button>
            <button class="adm-tab" id="tabUsers" onclick="showTab('users')">Пользователи</button>
        </div>
        <div id="tabActions"></div>
    </div>

    <!-- Verification panel -->
    <div id="panelVerif">
        <div style="display:flex;gap:6px;margin-bottom:16px;">
            <button class="btn-export" id="filterPending" onclick="loadVerif('pending')" style="border-color:var(--accent-bright);color:var(--accent-bright);">Ожидают</button>
            <button class="btn-export" id="filterAll" onclick="loadVerif('all')">Все заявки</button>
            <button class="btn-export" onclick="exportCsv()" style="margin-left:auto;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Экспорт CSV
            </button>
        </div>
        <div id="verifList"><div class="adm-empty">Загрузка...</div></div>
    </div>

    <!-- Users panel -->
    <div id="panelUsers" style="display:none;">
        <div class="usr-table-wrap">
            <table class="usr-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Компания</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="usersBody"><tr><td colspan="5" class="adm-empty">Загрузка...</td></tr></tbody>
            </table>
        </div>
    </div>

</div>

<script src="assets/app.js?v=6"></script>
<script src="assets/ui-animations.js"></script>
<script>
    if (localStorage.getItem('userRole') !== 'admin') window.location.href = 'login.html';

    const CAPS_LABEL = {
        lathe:'Токарные', mill:'Фрезерные', laser:'Лазерные', rti:'РТИ',
        cast:'Литьё', stamp:'Штамповка', paint:'Покраска', weld:'Сварка',
    };

    let currentVerifFilter = 'pending';
    let myUserId = null;

    // ── Init ─────────────────────────────────────────────────────────
    (async () => {
        try {
            const me = await apiFetch(`${SERVER_URL}/me`);
            if (me.ok) { const d = await me.json(); myUserId = d.id; }
        } catch {}
        loadStats();
        loadVerif('pending');
    })();

    // ── Tabs ──────────────────────────────────────────────────────────
    function showTab(tab) {
        document.getElementById('panelVerif').style.display = tab === 'verif' ? '' : 'none';
        document.getElementById('panelUsers').style.display = tab === 'users' ? '' : 'none';
        document.getElementById('tabVerif').classList.toggle('active', tab === 'verif');
        document.getElementById('tabUsers').classList.toggle('active', tab === 'users');
        if (tab === 'users') loadUsers();
    }

    // ── KPI ───────────────────────────────────────────────────────────
    async function loadStats() {
        try {
            const r = await apiFetch(`${SERVER_URL}/admin/stats`);
            if (!r.ok) return;
            const d = await r.json();
            document.getElementById('kpiUsers').textContent    = d.users;
            document.getElementById('kpiPending').textContent  = d.pending;
            document.getElementById('kpiOrders').textContent   = d.orders;
            document.getElementById('kpiCompanies').textContent = d.companies;
            const badge = document.getElementById('pendingBadge');
            badge.textContent = d.pending;
            badge.style.display = d.pending > 0 ? 'inline-flex' : 'none';
        } catch {}
    }

    // ── Verification ──────────────────────────────────────────────────
    async function loadVerif(filter) {
        currentVerifFilter = filter;
        document.getElementById('filterPending').style.borderColor = filter === 'pending' ? 'var(--accent-bright)' : '';
        document.getElementById('filterPending').style.color       = filter === 'pending' ? 'var(--accent-bright)' : '';
        document.getElementById('filterAll').style.borderColor     = filter === 'all' ? 'var(--accent-bright)' : '';
        document.getElementById('filterAll').style.color           = filter === 'all' ? 'var(--accent-bright)' : '';
        const list = document.getElementById('verifList');
        list.innerHTML = '<div class="adm-empty">Загрузка...</div>';
        try {
            const r = await apiFetch(`${SERVER_URL}/verification/requests?filter=${filter}`);
            if (!r.ok) { list.innerHTML = '<div class="adm-empty">Ошибка загрузки</div>'; return; }
            const items = await r.json();
            if (!items.length) { list.innerHTML = '<div class="adm-empty">Заявок нет</div>'; return; }
            list.innerHTML = items.map(renderVerifCard).join('');
        } catch { list.innerHTML = '<div class="adm-empty">Сервер недоступен</div>'; }
    }

    function renderVerifCard(r) {
        const statusLabel = { pending:'Ожидает', approved:'Одобрено', approved_auto:'Авто (ЕГРЮЛ)', rejected:'Отклонено' }[r.status] || r.status;
        const roleText = r.companyRole === 'producer' ? 'Производитель' : 'Заказчик';
        const dateStr = r.requestedAt ? new Date(r.requestedAt).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const reviewStr = r.reviewedAt ? new Date(r.reviewedAt).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}) : '';

        const details = [
            ['ИНН', r.inn], ['ОГРН', r.ogrn], ['Директор', r.director],
            ['Год основания', r.foundingYear], ['Уставной капитал', r.authorizedCapital],
            ['Сотрудников', r.employees ? r.employees + ' чел.' : ''],
            ['Выручка', r.revenue], ['Станков', r.machinesCount ? r.machinesCount + ' ед.' : ''],
            ['Площадь', r.productionArea ? r.productionArea + ' м²' : ''],
            ['Специализация', r.specialization], ['Город', r.city],
        ].filter(([, v]) => v);

        const capsHtml = r.capabilities?.length
            ? `<div style="margin-bottom:12px;"><div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">Производственные мощности:</div>
               <div class="req-caps">${r.capabilities.map(k=>`<span class="cap-chip">${escapeHtml(CAPS_LABEL[k]||k)}</span>`).join('')}</div></div>`
            : '';

        const commentHtml = r.status === 'rejected' && r.adminComment
            ? `<div class="reject-comment-block"><strong>Причина отклонения:</strong> ${escapeHtml(r.adminComment)}</div>`
            : '';

        const actionsHtml = r.status === 'pending' ? `
            <div class="req-actions" id="actions-${r.id}">
                <button class="btn-approve" onclick="approve(${r.id})">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                    Одобрить
                </button>
                <button class="btn-reject-open" onclick="showRejectForm(${r.id})">Отклонить</button>
                <div class="reject-form" id="rejectForm-${r.id}">
                    <textarea id="rejectComment-${r.id}" placeholder="Причина отклонения (необязательно)..." class="form-group" style="width:100%;box-sizing:border-box;"></textarea>
                    <div class="reject-form-btns">
                        <button class="btn-reject-open" onclick="confirmReject(${r.id})" style="background:rgba(248,113,113,.12);">Подтвердить</button>
                        <button class="btn-export" onclick="hideRejectForm(${r.id})">Отмена</button>
                    </div>
                </div>
            </div>` : '';

        return `
        <div class="req-card" id="card-${r.id}">
            <div class="req-card-head">
                <div>
                    <div class="req-company">${escapeHtml(r.company)}</div>
                    <div class="req-meta">${roleText} · Заявка: ${dateStr}${reviewStr ? ' · Рассмотрена: '+reviewStr : ''}</div>
                </div>
                <span class="req-badge ${r.status}">${statusLabel}</span>
            </div>
            <div class="req-details">
                ${details.map(([l,v])=>`<div class="req-detail"><div class="req-detail-lbl">${escapeHtml(l)}</div><div class="req-detail-val">${escapeHtml(String(v))}</div></div>`).join('')}
            </div>
            ${capsHtml}
            ${commentHtml}
            ${actionsHtml}
        </div>`;
    }

    async function approve(id) {
        if (!confirm('Верифицировать компанию?')) return;
        try {
            const r = await apiFetch(`${SERVER_URL}/verification/${id}/approve`, { method:'POST' });
            if (!r.ok) { const d = await r.json(); return alert(d.error); }
            loadVerif(currentVerifFilter);
            loadStats();
        } catch { alert('Сервер недоступен'); }
    }

    function showRejectForm(id) { document.getElementById('rejectForm-'+id).classList.add('open'); }
    function hideRejectForm(id) { document.getElementById('rejectForm-'+id).classList.remove('open'); }

    async function confirmReject(id) {
        const comment = document.getElementById('rejectComment-'+id).value.trim();
        try {
            const r = await apiFetch(`${SERVER_URL}/verification/${id}/reject`, {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({comment})
            });
            if (!r.ok) { const d = await r.json(); return alert(d.error); }
            loadVerif(currentVerifFilter);
            loadStats();
        } catch { alert('Сервер недоступен'); }
    }

    // ── Users ─────────────────────────────────────────────────────────
    async function loadUsers() {
        const tbody = document.getElementById('usersBody');
        tbody.innerHTML = '<tr><td colspan="5" class="adm-empty">Загрузка...</td></tr>';
        try {
            const r = await apiFetch(`${SERVER_URL}/admin/users`);
            if (!r.ok) { tbody.innerHTML = '<tr><td colspan="5" class="adm-empty">Ошибка загрузки</td></tr>'; return; }
            const users = await r.json();
            if (!users.length) { tbody.innerHTML = '<tr><td colspan="5" class="adm-empty">Нет пользователей</td></tr>'; return; }
            tbody.innerHTML = users.map(u => {
                const isMe = u.id === myUserId;
                const roleLabel = { admin:'Админ', producer:'Поставщик', customer:'Заказчик' }[u.role] || u.role;
                return `<tr id="usr-row-${u.id}">
                    <td style="color:var(--text-muted);font-size:12px;">#${u.id}</td>
                    <td>${escapeHtml(u.email)}${isMe ? '<span class="usr-me">(вы)</span>' : ''}</td>
                    <td><span class="role-pill ${u.role}">${roleLabel}</span></td>
                    <td style="color:var(--text-secondary);">${escapeHtml(u.company||'—')}</td>
                    <td>${isMe ? '' : `<button class="usr-del-btn" onclick="deleteUser(${u.id}, '${escapeHtml(u.email)}')">Удалить</button>`}</td>
                </tr>`;
            }).join('');
        } catch { tbody.innerHTML = '<tr><td colspan="5" class="adm-empty">Сервер недоступен</td></tr>'; }
    }

    async function deleteUser(id, email) {
        if (!confirm(`Удалить пользователя ${email}?`)) return;
        try {
            const r = await apiFetch(`${SERVER_URL}/admin/users/${id}`, { method:'DELETE' });
            if (!r.ok) { const d = await r.json(); return alert(d.error); }
            document.getElementById('usr-row-'+id)?.remove();
            loadStats();
            showToast(`Пользователь ${email} удалён`, 'success');
        } catch { alert('Сервер недоступен'); }
    }

    // ── CSV Export ────────────────────────────────────────────────────
    async function exportCsv() {
        try {
            const r = await apiFetch(`${SERVER_URL}/verification/requests?filter=all`);
            if (!r.ok) return alert('Ошибка загрузки данных');
            const items = await r.json();
            if (!items.length) return alert('Нет данных для экспорта');
            const headers = ['ID','Компания','Роль','ИНН','ОГРН','Директор','Город','Статус','Дата заявки','Рассмотрена','Комментарий'];
            const rows = items.map(i => [
                i.id, i.company, i.companyRole==='producer'?'Производитель':'Заказчик',
                i.inn||'', i.ogrn||'', i.director||'', i.city||'',
                {pending:'Ожидает',approved:'Одобрено',rejected:'Отклонено'}[i.status]||i.status,
                i.requestedAt ? new Date(i.requestedAt).toLocaleDateString('ru-RU') : '',
                i.reviewedAt  ? new Date(i.reviewedAt).toLocaleDateString('ru-RU')  : '',
                i.adminComment||''
            ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
            const csv = '﻿' + [headers.map(h=>`"${h}"`), ...rows].map(r=>r.join(',')).join('\r\n');
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
                download: `verifications_${new Date().toISOString().slice(0,10)}.csv`
            });
            a.click(); URL.revokeObjectURL(a.href);
        } catch { alert('Сервер недоступен'); }
    }

    function adminLogout() { logout(); }
</script>
</body>
</html>
