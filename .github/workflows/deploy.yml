name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Static checks (syntax, HTML, CSS)
        run: npm run check
      - name: PDF smoke (fonts, pages, rubles-in-words)
        run: node scripts/pdf-smoke.js

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd /var/www/neft
            git fetch origin
            git reset --hard origin/main
            npm install --production
            pm2 restart neft || pm2 start ecosystem.config.js
            pm2 save
