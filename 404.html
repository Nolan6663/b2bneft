<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Страница не найдена</title>
    <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');</script>
    <style>html{background:#fff}[data-theme="dark"]{background:#0F172A}</style>
    <link rel="stylesheet" href="assets/theme-v2.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .nf-wrap { text-align: center; max-width: 420px; padding: 40px 24px; }
        .nf-code {
            font-size: 100px; font-weight: 900; line-height: 1;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; opacity: .25;
        }
        .nf-title { font-size: 22px; font-weight: 800; color: var(--text-primary-alt); margin: 16px 0 10px; }
        .nf-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6; }
        .nf-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .nf-btn-back {
            display: inline-flex; align-items: center; gap: 6px;
            height: 42px; padding: 0 20px; border-radius: 10px;
            font-size: 13px; font-weight: 600; text-decoration: none;
            background: transparent; border: 1px solid var(--inner-border);
            color: var(--text-primary); cursor: pointer;
            transition: border-color .15s;
        }
        .nf-btn-back:hover { border-color: var(--text-secondary); }
        .nf-btn-home {
            display: inline-flex; align-items: center; gap: 6px;
            height: 42px; padding: 0 20px; border-radius: 10px;
            font-size: 13px; font-weight: 600; text-decoration: none;
            background: var(--accent-gradient); color: var(--accent-on-button);
            transition: opacity .15s; border: none;
        }
        .nf-btn-home:hover { opacity: .88; }
    </style>
</head>
<body>
    <div class="nf-wrap">
        <div class="nf-code">404</div>
        <div class="nf-title">Страница не найдена</div>
        <div class="nf-text">Запрошенная страница не существует или была перемещена. Проверьте адрес или вернитесь назад.</div>
        <div class="nf-actions">
            <button class="nf-btn-back" onclick="history.back()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Назад
            </button>
            <a class="nf-btn-home" href="javascript:void(0)" id="homeLink">
                На главную
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </a>
        </div>
    </div>
    <script src="assets/app.js"></script>
    <script>
        const role = localStorage.getItem('userRole');
        const token = localStorage.getItem('authToken');
        const homeLink = document.getElementById('homeLink');
        if (!token) homeLink.href = 'login.html';
        else if (role === 'admin') homeLink.href = 'admin.html';
        else homeLink.href = role === 'customer' ? 'index.html' : 'producer.html';
    </script>
</body>
</html>
