<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Нефтесервис — Избранное</title>
    <script>if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <link rel="stylesheet" href="assets/theme.css">
    <style>
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .fav-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 20px;
            cursor: pointer;
            transition: border-color .15s, transform .15s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .fav-card:hover { border-color: var(--accent-bright); transform: translateY(-2px); }

        .fav-card-top { display: flex; align-items: flex-start; gap: 12px; }
        .fav-avatar {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: #fff;
        }
        .fav-name-row { flex: 1; }
        .fav-name { font-size: 14px; font-weight: 700; color: var(--text-primary-alt); line-height: 1.3; margin-bottom: 5px; }
        .fav-unstar {
            background: none; border: none; font-size: 18px; cursor: pointer;
            color: #f5b942; padding: 4px; line-height: 1; flex-shrink: 0;
            border-radius: 8px; transition: background .12s;
        }
        .fav-unstar:hover { background: rgba(245,185,66,.12); }

        .fav-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--text-secondary); }
        .fav-meta span { display: flex; align-items: center; gap: 4px; }

        .fav-spec { font-size: 12.5px; color: var(--text-tertiary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .fav-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .fav-rating { font-size: 12.5px; font-weight: 600; color: var(--accent-bright); }
        .fav-status { font-size: 11.5px; }

        .fav-empty {
            grid-column: 1 / -1;
            text-align: center; padding: 80px 20px;
            color: var(--text-secondary); font-size: 14px;
        }
        .fav-empty svg { opacity: .25; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><img src="assets/icons_svg/logo_hex.svg" alt=""><span>B2B НЕФТЕСЕРВИС</span></div>
        <a href="#" id="mainCabinetLink"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Актуальные закупки<span class="nav-badge" id="navBadgeOrders"></span></a>
        <a href="proposals.html" id="navProposals"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Мои отклики<span class="nav-badge" id="navBadgeProposals"></span></a>
        <a href="deals.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 12 2 2 4-4"/></svg>Заказы</a>
        <a href="partners.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Контрагенты</a>
        <a href="analytics.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Аналитика</a>
        <a href="messages.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Сообщения<span class="nav-badge" id="navBadgeMessages"></span></a>
        <a href="favorites.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Избранное</a>
        <a href="#" id="sidebarProfileLink" style="display:none;">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 21v-1a7 7 0 0 1 16 0v1"></path></svg>
            Мой профиль
        </a>
        <a href="settings.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>Настройки</a>
        <a href="tariff.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Тариф и оплата</a>

        <div class="sidebar-bottom">
            <div class="theme-toggle-row">
                <span id="themeLabel" class="theme-label">🌙 Тёмная тема</span>
                <label class="theme-switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
                    <span class="theme-slider"></span>
                </label>
            </div>
            <a href="#" class="switch-link" onclick="logout(); return false;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Выйти из аккаунта
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Избранное</h2>
            <button class="bell-btn" onclick="openNotificationsModal()">
                <img src="assets/icons_svg/bell.svg" alt="" style="width:18px;height:18px;">
                <span class="bell-badge" id="bellBadge">0</span>
            </button>
        </div>

        <div id="favContent">
            <div class="section"><div class="fav-grid"><div class="fav-empty">Загрузка...</div></div></div>
        </div>
    </div>

    <div class="modal" id="notificationModal">
        <div class="modal-content" style="width: 440px;">
            <h3>Уведомления платформы</h3>
            <div id="notificationsList" style="max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; background: var(--inner-bg); border-radius: 12px; border: 1px solid var(--inner-border);"></div>
            <div class="modal-actions" style="justify-content: space-between;">
                <button onclick="clearNotifications()" style="color: var(--error); border:none; background:transparent; cursor:pointer; font-size: 13px; padding: 8px 14px;">Очистить историю</button>
                <button class="btn-modal-cancel" onclick="closeNotificationsModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="assets/app.js"></script>
    <script>
        if (!localStorage.getItem('authToken')) window.location.href = 'login.html';

        const userRole  = localStorage.getItem('userRole');
        const myCompany = localStorage.getItem('userCompany');

        window.addEventListener('DOMContentLoaded', () => {
            const mainLink = document.getElementById('mainCabinetLink');
            if (mainLink) mainLink.href = userRole === 'customer' ? 'index.html' : 'producer.html';
            const navProposals = document.getElementById('navProposals');
            if (navProposals) navProposals.style.display = userRole === 'customer' ? 'none' : '';
            const profileLink = document.getElementById('sidebarProfileLink');
            if (profileLink && myCompany) {
                const companies = JSON.parse(localStorage.getItem('_companiesCache') || '[]');
                const co = companies.find && companies.find(c => c.company === myCompany);
                if (co) { profileLink.href = `company-profile.html?id=${co.id}`; profileLink.style.display = ''; }
            }
            initNotifications();
            initSidebarBadges();
            loadFavorites();
        });

        async function loadFavorites() {
            try {
                const r = await fetch(`${SERVER_URL}/favorites`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
                });
                const favs = r.ok ? await r.json() : [];
                renderFavorites(favs);
            } catch {
                document.getElementById('favContent').innerHTML = '<div class="section"><p style="color:var(--text-secondary);">Не удалось загрузить избранное</p></div>';
            }
        }

        function renderFavorites(favs) {
            if (!favs.length) {
                document.getElementById('favContent').innerHTML = `
                <div class="section">
                    <div class="fav-grid">
                        <div class="fav-empty">
                            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            <p>В избранном пока ничего нет</p>
                            <p style="font-size:12.5px; margin-top:6px;">Добавляйте компании из <a href="partners.html" style="color:var(--accent-bright);">реестра контрагентов</a></p>
                        </div>
                    </div>
                </div>`;
                return;
            }

            const cards = favs.map(c => {
                const letter = (c.company || '?').replace(/[«»"]/g, '').trim().charAt(0).toUpperCase();
                const color  = c.role === 'producer' ? 'var(--avatar-green)' : 'var(--avatar-blue)';
                const roleText  = c.role === 'producer' ? 'Производитель' : 'Заказчик';
                const roleClass = c.role === 'producer' ? 'producer' : 'customer';
                const statusDot = c.status === 'Верифицирован' ? '<span class="status-icon win" style="font-size:11px;">✓ Верифицирован</span>' : '';

                const metaItems = [
                    c.city ? `<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${escapeHtml(c.city)}</span>` : '',
                    c.yearsExperience ? `<span>Опыт: ${c.yearsExperience} лет</span>` : '',
                    c.inn ? `<span>ИНН: ${escapeHtml(c.inn)}</span>` : '',
                ].filter(Boolean).join('');

                return `
                <div class="fav-card" onclick="window.location.href='company-profile.html?id=${c.id}'">
                    <div class="fav-card-top">
                        <div class="fav-avatar" style="background:${color};">${escapeHtml(letter)}</div>
                        <div class="fav-name-row">
                            <div class="fav-name">${escapeHtml(c.company)}</div>
                            <span class="badge ${roleClass}">${roleText}</span>
                        </div>
                        <button class="fav-unstar" title="Убрать из избранного" onclick="removeFav(event, ${c.id})">★</button>
                    </div>
                    ${metaItems ? `<div class="fav-meta">${metaItems}</div>` : ''}
                    ${c.specialization ? `<div class="fav-spec">${escapeHtml(c.specialization)}</div>` : ''}
                    <div class="fav-footer">
                        <span class="fav-rating">${c.rating ? '★ ' + c.rating : ''}</span>
                        ${statusDot}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('favContent').innerHTML = `
                <div class="section">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                        <span style="font-size:13px; color:var(--text-secondary);">${favs.length} компани${favs.length === 1 ? 'я' : favs.length < 5 ? 'и' : 'й'}</span>
                    </div>
                    <div class="fav-grid">${cards}</div>
                </div>`;
        }

        async function removeFav(e, companyId) {
            e.stopPropagation();
            try {
                const r = await fetch(`${SERVER_URL}/favorites/${companyId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
                });
                if (r.ok) loadFavorites();
            } catch { alert('Сервер недоступен'); }
        }
    </script>
</body>
</html>
