<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Платформа - Кабинет Заказчика</title>
    <style>
/* ПРЕМИАЛЬНАЯ МИНИМАЛИСТИЧНАЯ ДИЗАЙН-СИСТЕМА */
        :root {
            --bg-main: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-sidebar: #090d16;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --border-color: rgba(15, 23, 42, 0.06);
            --modal-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #f1f5f9;
            --input-text: #0f172a;
            --sidebar-text: #f1f5f9;
            --blur-effect: blur(12px);
        }

        body.dark-mode {
            --bg-main: #030712;
            --bg-card: rgba(17, 24, 39, 0.6);
            --bg-sidebar: #0b0f19;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --border-color: rgba(255, 255, 255, 0.05);
            --modal-bg: rgba(15, 23, 42, 0.95);
            --input-bg: #0f172a;
            --input-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.3s ease, 
                        box-shadow 0.3s ease;
        }

        body {
            display: flex;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

/* ПОЛНОЕ ИСПРАВЛЕНИЕ СAЙДБАРА */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Плотный аккуратный шаг между пунктами */
        }

        .sidebar h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Полный сброс фиолетового цвета для ВСЕХ ссылок меню */
        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 10px;
            color: rgba(241, 245, 249, 0.6) !important; /* Матовый светлый текст по умолчанию */
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 500;
        }

        /* Эффект при наведении */
        .sidebar a:hover {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.04);
        }

        /* Активный пункт меню */
        .sidebar a.active {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }

        /* Контейнер переключателя темы (всегда прижат вниз) */
        .theme-container {
            margin-top: auto; /* Выталкивает весь блок в самый низ */
            padding-top: 20px;
            margin-bottom: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .theme-text {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
        }

        /* Нижняя кнопка смены кабинета */
        .sidebar .switch-link {
            margin-top: 0;
            padding: 14px;
            text-align: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03) !important;
            color: #ffffff !important;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .sidebar .switch-link:hover {
            background: #ffffff !important;
            color: #090d16 !important;
            border-color: transparent !important;
            transform: translateY(-1px);
        }

        /* ТУМБЛЕР ТЕМЫ */
        .theme-container {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .theme-text { font-size: 13px; font-weight: 500; color: #64748b; }
        .theme-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; border-radius: 20px; }
        .theme-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.25s; }
        .theme-switch input:checked + .theme-slider { background-color: var(--accent-blue); }
        .theme-switch input:checked + .theme-slider:before { transform: translateX(16px); }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            overflow-y: auto;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .btn-create {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        .btn-create:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }

        /* КАРТОЧКИ И ТАБЛИЦЫ */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--blur-effect);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .section h3 { font-size: 18px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.3px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 16px; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        td { padding: 18px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(148, 163, 184, 0.02); }

        /* СТИЛЬНЫЕ ТЕГИ */
        .tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
        .tag.rti { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag.metal { background: rgba(99, 102, 241, 0.1); color: #6366f1; }

        .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
        .status-badge.active { background: rgba(16, 185, 129, 0.08); color: #10b981; }
        .status-badge.closed { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); }

        .btn-view {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .btn-view:hover { background: var(--text-main); color: var(--bg-main); border-color: transparent; }

/* ПРЕМИАЛЬНЫЙ ДИЗАЙН МОДАЛЬНЫХ ОКН */
        .modal {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 20px;
            width: 460px;
            max-width: 95vw;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 20px; /* Вертикальный стек для всех блоков внутри */
        }

        .modal-content h3 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Поля ввода на всю ширину контейнера */
        .form-group input, 
        .form-group select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--input-text);
            font-size: 14px;
            font-weight: 500;
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus, 
        .form-group select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Блок кнопок внизу */
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-modal-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-modal-cancel:hover {
            background: rgba(148, 163, 184, 0.08);
        }

        .btn-modal-submit {
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-modal-submit { background-color: var(--accent-blue); box-shadow: 0 4px 12px var(--accent-glow); }
        /* СТИЛИЗАЦИЯ КНОПКИ ПРИНЯТЬ КП */
        .btn-accept {
            background-color: #10b981;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
            transition: all 0.2s ease;
        }

        .btn-accept:hover {
            background-color: #059669;
            box-shadow: 0 6px 16px rgba(5, 150, 105, 0.25);
            transform: translateY(-1px);
        }

        .btn-accept:active {
            transform: translateY(0);
        }
        </style>
</head>
<body>

<div class="sidebar">
        <h1>B2B Платформа</h1>
        
        <a href="#" class="active">Мои заявки</a>
        <a href="#">Контрагенты</a>
        <a href="#">Аналитика</a>
        
<div class="theme-container">
            <span id="themeLabel" class="theme-text">☀️ Светлая тема</span>
            <label class="theme-switch">
                <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
                <span class="theme-slider"></span>
            </label>
        </div>

        <a href="producer.html" class="switch-link">Войти как Производитель</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Актуальные заявки</h2>
            <button class="btn-create" onclick="openModal()">+ Создать заявку</button>
        </div>

        <div class="section">
            <h3>Список размещенных заказов</h3>
            <table>
                <thead>
                    <tr>
                        <th>Наименование позиции</th>
                        <th>Категория</th>
                        <th>Статус</th>
                        <th>Отклики</th>
                        <th>Дедлайн</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    </tbody>
            </table>
        </div>
    </div>

   <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3>Новая заявка на производство</h3>
            
            <div class="form-group">
                <label>Наименование изделия</label>
                <input type="text" id="orderName" placeholder="Например, Манжета резиновая армированная">
            </div>

            <div class="form-group">
                <label>Категория</label>
                <select id="orderCategory">
                    <option value="РТИ">РТИ</option>
                    <option value="Металл">Металл</option>
                </select>
            </div>

            <div class="form-group">
                <label>Дедлайн поставки</label>
                <input type="text" id="orderDeadline" placeholder="Например, 30.05.2026">
            </div>

            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-modal-submit" onclick="createOrder()">Добавить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="proposalsModal">
            <div class="modal-content" style="width: 650px; max-width: 90vw;">
                <h3 id="proposalsModalTitle">Входящие предложения</h3>
                <div style="overflow-x: auto; margin-top: 15px;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background-color: #f8fafc; text-align: left;">
                                <th style="padding: 12px 10px; border-bottom: 2px solid #e2e8f0; width: 30%;">Поставщик</th>
                                <th style="padding: 12px 10px; border-bottom: 2px solid #e2e8f0; width: 25%;">Цена</th>
                                <th style="padding: 12px 10px; border-bottom: 2px solid #e2e8f0; width: 20%;">Срок</th>
                                <th style="padding: 12px 10px; border-bottom: 2px solid #e2e8f0; width: 15%;">Статус</th>
                                <th style="padding: 12px 10px; border-bottom: 2px solid #e2e8f0; width: 10%; text-align: center;">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="proposals-table-body">
                            </tbody>
                    </table>
                </div>
                    <div class="modal-actions">
                        <button class="btn-modal-cancel" onclick="closeProposalsModal()">Закрыть</button>
                    </div>
            </div>
    </div>

    <script>
        const SERVER_URL = 'https://b2b-neft-backend.onrender.com/api';

        window.addEventListener('DOMContentLoaded', () => {
            loadOrders();
        });

        function openModal() { document.getElementById('orderModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function closeProposalsModal() { document.getElementById('proposalsModal').style.display = 'none'; }

        async function loadOrders() {
            try {
                const response = await fetch(`${SERVER_URL}/orders`);
                const orders = await response.json();
                
                const tableBody = document.getElementById('orders-table-body');
                if (!tableBody) return;
                tableBody.innerHTML = ''; 

                orders.forEach(order => {
                    const row = document.createElement('tr');
                    row.className = 'clickable-row';
                    row.style.cursor = 'pointer';
                    row.onclick = () => viewProposals(order.id, order.title);

                    const statusClass = order.status === 'Закрыта' ? 'status closed' : 'status active';

                    row.innerHTML = `
                        <td><strong>${order.title}</strong></td>
                        <td>${order.category}</td>
                        <td><span class="${statusClass}">${order.status}</span></td>
                        <td style="color: #2980b9; font-weight: bold;">${order.responses} (посмотреть)</td>
                        <td>${order.deadline}</td>
                    `;
             tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Ошибка при загрузке заявок:', error);
            }
        }

        async function viewProposals(orderId, orderTitle) {
    document.getElementById('proposalsModalTitle').innerText = `Отклики на: ${orderTitle}`;
    const tableBody = document.getElementById('proposals-table-body');
    
    if (tableBody) {
        tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #7f8c8d;">Загрузка предложений...</td></tr>';
    }
    document.getElementById('proposalsModal').style.display = 'flex';

    try {
        const ordResponse = await fetch(`${SERVER_URL}/orders`);
        const allOrders = await ordResponse.json();
        const currentOrder = allOrders.find(o => Number(o.id) === Number(orderId));

        const response = await fetch(`${SERVER_URL}/order-proposals/${orderId}`);
        let proposals = await response.json(); // Изменили на let
        
        // Автоматическая сортировка по возрастанию цены
        proposals.sort((a, b) => a.price - b.price); 

        tableBody.innerHTML = ''; 

        if (proposals.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px; color: #7f8c8d;">На эту заявку пока никто не откликнулся</td></tr>`;
        } else {
            proposals.forEach(prop => {
                const row = document.createElement('tr');
                
                let badgeClass = 'badge waiting';
                if (prop.status === 'Выигран') badgeClass = 'badge win';
                if (prop.status === 'Отклонен') badgeClass = 'badge loose';

                const isClosed = currentOrder && currentOrder.status === 'Закрыта';
                const actionCell = !isClosed 
                    ? `<button class="btn-accept" onclick="acceptProposal(${prop.id})">Принять</button>`

                    : `<span style="font-size: 12px; color: #94a3b8;">Завершен</span>`;

                row.innerHTML = `
                    <td style="padding: 12px 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px;"><strong>${prop.company}</strong></td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px; color: #2c3e50;">${prop.price} ₽/шт</td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px; color: #2c3e50;">${prop.days} дней</td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid #e2e8f0;"><span class="${badgeClass}">${prop.status}</span></td>
                    <td style="padding: 12px 10px; border-bottom: 1px solid #e2e8f0; text-align: center;">${actionCell}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    } catch (error) {
        console.error('Ошибка при получении предложений:', error);
        if (tableBody) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px; color: #ef4444;">Ошибка загрузки данных с сервера</td></tr>`;
        }
    }
}

        async function createOrder() {
            const titleInput = document.getElementById('orderName');
            const categoryInput = document.getElementById('orderCategory');
            const deadlineInput = document.getElementById('orderDeadline');

            if (!titleInput || !deadlineInput) return;

            const title = titleInput.value.trim();
            const category = categoryInput.value;
            const deadline = deadlineInput.value.trim();

            // Сбрасываем старые красные рамки, если они были
            titleInput.style.borderColor = '#ccc';
            deadlineInput.style.borderColor = '#ccc';

            // Проверка на пустоту
            if (!title || !deadline) {
                alert('Пожалуйста, заполните все поля заявки!');
                if (!title) titleInput.style.borderColor = '#e74c3c';
                if (!deadline) deadlineInput.style.borderColor = '#e74c3c';
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, category, deadline })
                });

                if (response.ok) {
                    closeModal();
                    loadOrders(); 
                    titleInput.value = '';
                    deadlineInput.value = '';
                } else {
                    alert('Ошибка сервера при создании заявки');
                }
            } catch (error) {
                console.error('Ошибка при отправке заявки:', error);
            }
        }   
   async function acceptProposal(proposalId) {
    if (!confirm('Вы уверены, что хотите принять это предложение и закрыть тендер?')) return;

    try {
        const response = await fetch(`${SERVER_URL}/proposals/${proposalId}/accept`, {
            method: 'POST'
        });

        if (response.ok) {
            closeProposalsModal();
            loadOrders(); // Перерисовываем главную таблицу заказчика
        } else {
            const err = await response.json();
            alert(err.error || 'Ошибка при выборе победителя');
        }
    } catch (error) {
        console.error('Ошибка:', error);
    }
}
// ДИНАМИЧЕСКАЯ СМЕНА ТЕМЫ И ТЕКСТА
function toggleTheme() {
    const body = document.body;
    const checkbox = document.getElementById('themeCheckbox');
    const label = document.getElementById('themeLabel');
    if (!checkbox || !label) return;

    if (checkbox.checked) {
        body.classList.add('dark-mode');
        label.innerText = '🌙 Тёмная тема';
        localStorage.setItem('theme', 'dark');
    } else {
        body.classList.remove('dark-mode');
        label.innerText = '☀️ Светлая тема';
        localStorage.setItem('theme', 'light');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme');
    const body = document.body;
    const checkbox = document.getElementById('themeCheckbox');
    const label = document.getElementById('themeLabel');
    
    if (savedTheme === 'dark') {
        body.classList.add('dark-mode');
        if (checkbox) checkbox.checked = true;
        if (label) label.innerText = '🌙 Тёмная тема';
    } else {
        if (checkbox) checkbox.checked = false;
        if (label) label.innerText = '☀️ Светлая тема';
    }
});
    </script>
</body>
</html>
